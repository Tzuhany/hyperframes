<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Context Menu - Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #demo {
        width: 1920px;
        height: 1080px;
        display: grid;
        place-items: center;
        background: #f5f5f4;
        font-family: Inter, system-ui, sans-serif;
      }
      .demo-frame {
        display: grid;
        place-items: center;
        min-width: 760px;
        min-height: 480px;
        padding: 56px;
      }
      .hf-ui-context-scene {
        position: relative;
        width: 360px;
        height: 260px;
        font-family: Inter, system-ui, sans-serif;
      }
      .hf-ui-context-cursor {
        position: absolute;
        left: 54px;
        top: 38px;
        width: 24px;
        height: 34px;
        clip-path: polygon(0 0, 0 100%, 9px 78%, 16px 96%, 22px 93%, 15px 74%, 34px 74%);
        background: #18181b;
        filter: drop-shadow(0 8px 12px rgba(0, 0, 0, 0.22));
      }
      .hf-ui-context-menu {
        position: absolute;
        left: 94px;
        top: 62px;
        width: 230px;
        padding: 8px;
        border: 1px solid #e4e4e7;
        border-radius: 16px;
        background: #ffffff;
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.14);
        transform-origin: top left;
      }
      .hf-ui-context-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 38px;
        padding: 0 10px;
        border-radius: 10px;
        color: #18181b;
        font-size: 14px;
        font-weight: 760;
      }
      .hf-ui-context-item.is-active {
        background: #18181b;
        color: #ffffff;
      }
      .hf-ui-context-item.danger {
        color: #dc2626;
      }
      .hf-ui-context-separator {
        height: 1px;
        margin: 6px;
        background: #e4e4e7;
      }
      .hf-ui-context-item kbd {
        color: inherit;
        opacity: 0.52;
      }
    </style>
  </head>
  <body>
    <div
      id="demo"
      data-composition-id="context-menu-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="5"
    >
      <div class="demo-frame">
        <div class="hf-ui-context-scene">
          <div class="hf-ui-context-cursor"></div>
          <div class="hf-ui-context-menu">
            <div class="hf-ui-context-item is-active"><span>Duplicate</span><kbd>D</kbd></div>
            <div class="hf-ui-context-item"><span>Rename</span><kbd>R</kbd></div>
            <div class="hf-ui-context-separator"></div>
            <div class="hf-ui-context-item danger"><span>Delete</span><kbd>Del</kbd></div>
          </div>
        </div>
      </div>
      <script>
        const tl = gsap.timeline({ paused: true });
        tl.fromTo(
          ".hf-ui-context-cursor",
          { x: -36, y: -18, opacity: 0 },
          { x: 0, y: 0, opacity: 1, duration: 0.36, ease: "power2.out" },
          0.25,
        );
        tl.fromTo(
          ".hf-ui-context-menu",
          { opacity: 0, scale: 0.88 },
          { opacity: 1, scale: 1, duration: 0.26, ease: "back.out(1.8)" },
          0.62,
        );
        tl.fromTo(
          ".hf-ui-context-item",
          { x: -10, opacity: 0 },
          { x: 0, opacity: 1, duration: 0.2, stagger: 0.05, ease: "power2.out" },
          0.75,
        );
        tl.set({}, {}, 5);
        window.__timelines = window.__timelines || {};
        window.__timelines["context-menu-demo"] = tl;
      </script>
    </div>
  </body>
</html>
