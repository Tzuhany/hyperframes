<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Toast - Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #demo {
        width: 1920px;
        height: 1080px;
        display: grid;
        place-items: center;
        background: #f6f7fb;
        font-family: Inter, system-ui, sans-serif;
      }
      .hf-ui-toast {
        --hf-toast-progress: 0;
        position: relative;
        display: grid;
        grid-template-columns: 18px 1fr;
        gap: 20px;
        width: 520px;
        padding: 28px;
        border: 1px solid #e4e4e7;
        border-radius: 24px;
        background: #fff;
        color: #18181b;
        font-family: Inter, system-ui, sans-serif;
        opacity: var(--hf-toast-progress);
        transform: translateY(calc((1 - var(--hf-toast-progress)) * 30px));
        box-shadow: 0 30px 90px rgba(0, 0, 0, 0.2);
      }
      .hf-ui-toast-dot {
        width: 18px;
        height: 18px;
        margin-top: 8px;
        border-radius: 999px;
        background: #16a34a;
        box-shadow: 0 0 0 calc(var(--hf-toast-progress) * 14px) rgba(22, 163, 74, 0.12);
      }
      .hf-ui-toast strong {
        display: block;
        font-size: 28px;
      }
      .hf-ui-toast span {
        color: #71717a;
        font-size: 21px;
      }
      .hf-ui-toast-rail {
        position: absolute;
        left: 28px;
        right: 28px;
        bottom: 15px;
        height: 5px;
        border-radius: 999px;
        background: #18181b;
        transform: scaleX(var(--hf-toast-progress));
        transform-origin: left;
      }
    </style>
  </head>
  <body>
    <div
      id="demo"
      data-composition-id="toast-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="5"
    >
      <div class="hf-ui-toast">
        <span class="hf-ui-toast-dot"></span>
        <div><strong>Render complete</strong><span>Your video is ready to share.</span></div>
        <span class="hf-ui-toast-rail"></span>
      </div>
      <script>
        const tl = gsap.timeline({ paused: true });
        tl.to(
          ".hf-ui-toast",
          { "--hf-toast-progress": 1, duration: 0.42, ease: "power3.out" },
          0.65,
        );
        tl.to(".hf-ui-toast", { "--hf-toast-progress": 0, duration: 0.32, ease: "power2.in" }, 3.4);
        window.__timelines = window.__timelines || {};
        window.__timelines["toast-demo"] = tl;
      </script>
    </div>
  </body>
</html>
