<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Design your visual direction</title>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/CustomEase.min.js"></script>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.167.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.167.0/examples/jsm/"}}</script>
<style>
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%;overflow:hidden}
body{font:400 13px/1.4 system-ui,-apple-system,sans-serif;background:#0e0e0e;color:#eee;-webkit-font-smoothing:antialiased}

/* ── Template selector overlay ── */
#hf-overlay{position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,.94);backdrop-filter:blur(12px);display:flex;flex-direction:column;transition:opacity .3s}
#hf-overlay.hidden{opacity:0;pointer-events:none}
#hf-overlay .hdr{padding:32px 40px 20px;display:flex;justify-content:space-between;align-items:center}
#hf-overlay .hdr h1{font:600 22px/1 system-ui;margin:0;letter-spacing:-.01em}
#hf-overlay .hdr button{background:none;border:1px solid #333;color:#eee;padding:6px 16px;font:500 11px/1 system-ui;cursor:pointer;letter-spacing:.08em;text-transform:uppercase;border-radius:4px}
#hf-overlay .hdr button:hover{background:#222}
#hf-grid{padding:0 40px 40px;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;overflow-y:auto;flex:1}
.hf-card{background:#141414;border:1px solid #1e1e1e;border-radius:6px;overflow:hidden;cursor:pointer;transition:all .15s}
.hf-card:hover{border-color:#444;transform:translateY(-2px)}
.hf-card .thumb{width:100%;aspect-ratio:16/9;overflow:hidden;position:relative;background:#0a0a0a}
.hf-card .thumb .sw{width:1920px;height:1080px;transform-origin:top left}
.hf-card .meta{padding:8px 12px;display:flex;justify-content:space-between;align-items:center;font:500 12px/1 system-ui}
.hf-card .meta .tag{font:400 9px/1 system-ui;color:#555;letter-spacing:.1em;text-transform:uppercase}

/* ── Main layout: sidebar + design page ── */
#hf-app{display:none;height:100vh;grid-template-columns:320px 1fr;overflow:hidden}
#hf-app.active{display:grid}

/* Sidebar */
#hf-sidebar{background:#111;border-right:1px solid #1a1a1a;overflow-y:auto;padding:0;display:flex;flex-direction:column}
#hf-sidebar .sb-header{padding:14px 16px;border-bottom:1px solid #1a1a1a;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
#hf-sidebar .sb-header .title{font:600 14px/1 system-ui;letter-spacing:-.01em}
#hf-sidebar .sb-header button{background:none;border:1px solid #333;color:#888;padding:4px 10px;font:500 10px/1 system-ui;cursor:pointer;letter-spacing:.06em;text-transform:uppercase;border-radius:3px}
#hf-sidebar .sb-header button:hover{color:#eee;border-color:#555}

.sb-section{padding:14px 16px;border-bottom:1px solid #1a1a1a}
.sb-section .sb-label{font:600 10px/1 system-ui;letter-spacing:.12em;text-transform:uppercase;color:#555;margin-bottom:10px}
.sb-options{display:flex;flex-wrap:wrap;gap:6px}
.sb-opt{background:#1a1a1a;border:1px solid #252525;border-radius:4px;padding:6px 10px;font:500 12px/1 system-ui;color:#999;cursor:pointer;transition:all .1s}
.sb-opt:hover{color:#eee;border-color:#444}
.sb-opt.active{background:#1e1e2e;border-color:#7C3AED;color:#eee}

/* Palette options */
.sb-pal{display:flex;align-items:center;gap:8px;padding:6px 10px;background:#1a1a1a;border:1px solid #252525;border-radius:4px;cursor:pointer;transition:all .1s;width:100%}
.sb-pal:hover{border-color:#444}
.sb-pal.active{border-color:#7C3AED;background:#1e1e2e}
.sb-pal .dots{display:flex;gap:3px}
.sb-pal .dot{width:14px;height:14px;border-radius:3px;border:1px solid rgba(255,255,255,.08)}
.sb-pal .name{font:500 12px/1 system-ui;color:#ccc;flex:1}

/* Shader options */
.sb-bg{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#1a1a1a;border:1px solid #252525;border-radius:4px;cursor:pointer;transition:all .1s;width:100%}
.sb-bg:hover{border-color:#444}
.sb-bg.active{border-color:#7C3AED;background:#1e1e2e}
.sb-bg .name{font:500 12px/1 system-ui;color:#ccc}
.sb-bg .desc{font:400 10px/1 system-ui;color:#666;margin-left:auto}

/* Export bar */
#hf-export-bar{padding:14px 16px;border-top:1px solid #1a1a1a;flex-shrink:0;margin-top:auto}
#hf-export-bar button{width:100%;background:#7C3AED;border:none;color:#fff;padding:10px;font:600 12px/1 system-ui;cursor:pointer;border-radius:4px;letter-spacing:.04em;text-transform:uppercase;transition:background .15s}
#hf-export-bar button:hover{background:#6d28d9}

/* Design page iframe */
#hf-preview{border:none;width:100%;height:100%}

/* Export overlay */
#hf-export-overlay{position:fixed;inset:0;z-index:9500;background:rgba(0,0,0,.88);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px}
#hf-export-overlay.visible{display:flex}
#hf-export-overlay textarea{width:90%;max-width:800px;height:60vh;background:#111;color:#ccc;border:1px solid #333;border-radius:8px;padding:16px;font:12px/1.5 monospace;resize:none}
#hf-export-overlay .actions{display:flex;gap:12px}
#hf-export-overlay button{background:#222;border:1px solid #444;color:#eee;padding:8px 20px;font:500 13px/1 system-ui;cursor:pointer;border-radius:4px}
#hf-export-overlay button.primary{background:#7C3AED;border-color:#7C3AED;color:#fff}
</style>
</head>
<body>

<!-- Template selector overlay -->
<div id="hf-overlay">
  <div class="hdr">
    <h1>Choose a template</h1>
    <button onclick="closeOverlay()" id="hf-close-btn" style="display:none">Close</button>
  </div>
  <div id="hf-grid"></div>
</div>

<!-- Main app: sidebar + preview -->
<div id="hf-app">
  <div id="hf-sidebar">
    <div class="sb-header">
      <span class="title" id="sb-tmpl-name">Template</span>
      <button onclick="openOverlay()">Change</button>
    </div>

    <!-- Palette -->
    <div class="sb-section" id="sb-palette">
      <div class="sb-label">Palette</div>
      <div class="sb-options" id="sb-palette-opts"></div>
    </div>

    <!-- Typography -->
    <div class="sb-section" id="sb-type">
      <div class="sb-label">Typography</div>
      <div class="sb-options" id="sb-type-opts"></div>
    </div>

    <!-- Easing -->
    <div class="sb-section" id="sb-easing">
      <div class="sb-label">Motion</div>
      <div class="sb-options" id="sb-easing-opts"></div>
    </div>

    <!-- Corners -->
    <div class="sb-section" id="sb-corners">
      <div class="sb-label">Corners</div>
      <div class="sb-options" id="sb-corners-opts"></div>
    </div>

    <!-- Density -->
    <div class="sb-section" id="sb-density">
      <div class="sb-label">Density</div>
      <div class="sb-options" id="sb-density-opts"></div>
    </div>

    <!-- Depth -->
    <div class="sb-section" id="sb-depth">
      <div class="sb-label">Depth</div>
      <div class="sb-options" id="sb-depth-opts"></div>
    </div>

    <!-- Background -->
    <div class="sb-section" id="sb-bg">
      <div class="sb-label">Background</div>
      <div class="sb-options" id="sb-bg-opts" style="flex-direction:column"></div>
    </div>

    <div id="hf-export-bar">
      <button onclick="exportDesign()">Export DESIGN.html</button>
    </div>
  </div>

  <iframe id="hf-preview" sandbox="allow-scripts allow-same-origin"></iframe>
</div>

<!-- Export overlay -->
<div id="hf-export-overlay">
  <textarea id="hf-export-output" readonly></textarea>
  <div class="actions">
    <button onclick="copyExport()">Copy</button>
    <button onclick="downloadExport()" class="primary">Download .html</button>
    <button onclick="document.getElementById('hf-export-overlay').classList.remove('visible')">Close</button>
  </div>
</div>

<script>
// ── Data ──
var PALETTES = __PALETTES_JSON__;
PALETTES.push({ name: "Custom", primary: "#FFFFFF", secondary: "#1A1A2E", tertiary: "#7B6F9E", accent: "#E94560", _custom: true });
var TYPEPAIRS = __TYPEPAIRS_JSON__;
var ALL_TEMPLATES = __TEMPLATES_JSON__;
var PROMPT = __PROMPT_JSON__;
var PROMPT_TEXT = __PROMPT_TEXT_JSON__;

var EASINGS = [
  { name: "Confident", value: "power3.out", desc: "Fast start, smooth deceleration" },
  { name: "Snappy", value: "expo.out", desc: "Very fast start, crisp stop" },
  { name: "Gentle", value: "sine.inOut", desc: "Soft acceleration and deceleration" },
  { name: "Bouncy", value: "back.out(1.4)", desc: "Overshoots then settles" },
  { name: "Elastic", value: "elastic.out(1, 0.5)", desc: "Springs past target and wobbles" },
  { name: "Sharp", value: "power4.out", desc: "Aggressive start, hard stop" }
];
var CORNERS = [{ name: "Sharp", value: "0px" }, { name: "Slight", value: "4px" }, { name: "Rounded", value: "12px" }];
var DENSITIES = [{ name: "Tight", desc: "Compact", padding: "8px", gap: "8px" }, { name: "Normal", desc: "Balanced", padding: "16px", gap: "16px" }, { name: "Generous", desc: "Spacious", padding: "32px", gap: "28px" }];
var DEPTHS = [{ name: "Flat", desc: "No shadows" }, { name: "Subtle", desc: "Faint shadows" }, { name: "Layered", desc: "Glows + depth" }];
var BG_PRESETS = [
  { name: "None", desc: "No shader" },
  { name: "Aurora", desc: "Flowing warmth", type: "plane", shader: "defaults", density: 1.3, speed: 0.4, strength: 4, rotX: 0, rotY: 10, rotZ: 50, camDist: 3.6, camAz: 180, camPol: 90, zoom: 1, posX: -1.4 },
  { name: "Tide", desc: "Undulating surface", type: "water", shader: "defaults", density: 1.2, speed: 0.2, strength: 3.4, rotX: 45, rotY: 0, rotZ: 0, camDist: 4.4, camAz: 170, camPol: 70, zoom: 1, posY: 0.9, posZ: -0.3 },
  { name: "Nebula", desc: "Iridescent depth", type: "sphere", shader: "cosmic", density: 0.8, speed: 0.3, strength: 0.3, rotX: 0, rotY: 130, rotZ: 70, camDist: 0.5, camAz: 270, camPol: 180, zoom: 15.1, posX: -0.1 },
  { name: "Drift", desc: "Slow dark current", type: "water", shader: "defaults", density: 1.5, speed: 0.3, strength: 0.4, rotX: 50, rotY: 0, rotZ: -60, camDist: 2.8, camAz: 180, camPol: 80, zoom: 9.1 },
  { name: "Ember", desc: "Radiant orb", type: "sphere", shader: "defaults", density: 1.1, speed: 0.1, strength: 0.4, rotX: 0, rotY: 0, rotZ: 0, camDist: 7.1, camAz: 60, camPol: 90, zoom: 15.3, posY: -0.15 },
  { name: "Silk", desc: "Gentle pastel", type: "water", shader: "defaults", density: 1, speed: 0.3, strength: 3, rotX: 0, rotY: 0, rotZ: -90, camDist: 2.9, camAz: 180, camPol: 120, zoom: 1, posY: 1.8 },
  { name: "Prism", desc: "Light refraction", type: "water", shader: "glass", density: 1.2, speed: 0.2, strength: 3.4, rotX: 45, rotY: 0, rotZ: 0, camDist: 4.4, camAz: 170, camPol: 70, zoom: 1, posY: 0.9, posZ: -0.3 },
  { name: "Fog", desc: "Layered mist", type: "sphere", shader: "fog", density: 1.0, speed: 0.4, strength: 1.0, rotX: 0, rotY: 0, rotZ: 0, camDist: 0.5, camAz: 180, camPol: 90, zoom: 25 },
  { name: "Blob", desc: "Organic wobble", type: "sphere", shader: "defaults", density: 1.3, speed: 0.4, strength: 1.5, rotX: 0, rotY: 10, rotZ: 0, camDist: 3.6, camAz: 180, camPol: 90, zoom: 1 }
];

// ── State ──
var state = { template: null, palette: 0, type: 0, easing: 0, corners: 1, density: 1, depth: 1, bg: 0 };
var _resolvedHtml = "";

// ── Template grid ──
function buildGrid() {
  var grid = document.getElementById("hf-grid");
  ALL_TEMPLATES.forEach(function(t) {
    var card = document.createElement("div");
    card.className = "hf-card";
    card.innerHTML = '<div class="thumb"><div class="sw" id="th-' + t.slug + '"></div></div><div class="meta"><span>' + t.name + '</span><span class="tag">' + (t.scheme || '') + '</span></div>';
    card.onclick = function() { pickTemplate(t.slug, t.name); };
    grid.appendChild(card);
  });
  requestAnimationFrame(function() {
    ALL_TEMPLATES.forEach(function(t) {
      var wrap = document.getElementById("th-" + t.slug);
      if (!wrap) return;
      var iframe = document.createElement("iframe");
      iframe.src = "templates/" + t.slug + "/template.html";
      iframe.sandbox = "allow-same-origin";
      iframe.style.cssText = "width:1920px;height:1080px;border:none;pointer-events:none;";
      iframe.loading = "lazy";
      wrap.appendChild(iframe);
      iframe.onload = function() { wrap.style.transform = "scale(" + (wrap.parentElement.clientWidth / 1920) + ")"; };
    });
  });
}

function openOverlay() { document.getElementById("hf-overlay").classList.remove("hidden"); }
function closeOverlay() { document.getElementById("hf-overlay").classList.add("hidden"); }

// ── Template pick ──
function pickTemplate(slug, name) {
  state.template = slug;
  document.getElementById("sb-tmpl-name").textContent = name || slug;
  document.getElementById("hf-close-btn").style.display = "";
  closeOverlay();
  document.getElementById("hf-app").classList.add("active");
  renderPage();
}

// ── Sidebar controls ──
function buildSidebar() {
  // Palettes
  var palOpts = document.getElementById("sb-palette-opts");
  PALETTES.forEach(function(p, i) {
    var el = document.createElement("div");
    el.className = "sb-pal" + (i === state.palette ? " active" : "");
    el.innerHTML = '<div class="dots"><div class="dot" style="background:' + p.primary + '"></div><div class="dot" style="background:' + p.secondary + '"></div><div class="dot" style="background:' + p.tertiary + '"></div><div class="dot" style="background:' + p.accent + '"></div></div><span class="name">' + p.name + '</span>';
    el.onclick = function() { state.palette = i; refreshSidebar(); renderPage(); };
    palOpts.appendChild(el);
  });

  // Type pairs
  var typeOpts = document.getElementById("sb-type-opts");
  TYPEPAIRS.forEach(function(t, i) {
    var el = document.createElement("div");
    el.className = "sb-opt" + (i === state.type ? " active" : "");
    el.textContent = t.name;
    el.onclick = function() { state.type = i; refreshSidebar(); renderPage(); };
    typeOpts.appendChild(el);
  });

  // Easings
  var eOpts = document.getElementById("sb-easing-opts");
  EASINGS.forEach(function(e, i) {
    var el = document.createElement("div");
    el.className = "sb-opt" + (i === state.easing ? " active" : "");
    el.textContent = e.name;
    el.title = e.desc;
    el.onclick = function() { state.easing = i; refreshSidebar(); renderPage(); };
    eOpts.appendChild(el);
  });

  // Corners
  var cOpts = document.getElementById("sb-corners-opts");
  CORNERS.forEach(function(c, i) {
    var el = document.createElement("div");
    el.className = "sb-opt" + (i === state.corners ? " active" : "");
    el.textContent = c.name;
    el.onclick = function() { state.corners = i; refreshSidebar(); renderPage(); };
    cOpts.appendChild(el);
  });

  // Density
  var dOpts = document.getElementById("sb-density-opts");
  DENSITIES.forEach(function(d, i) {
    var el = document.createElement("div");
    el.className = "sb-opt" + (i === state.density ? " active" : "");
    el.textContent = d.name;
    el.title = d.desc;
    el.onclick = function() { state.density = i; refreshSidebar(); renderPage(); };
    dOpts.appendChild(el);
  });

  // Depth
  var dpOpts = document.getElementById("sb-depth-opts");
  DEPTHS.forEach(function(d, i) {
    var el = document.createElement("div");
    el.className = "sb-opt" + (i === state.depth ? " active" : "");
    el.textContent = d.name;
    el.title = d.desc;
    el.onclick = function() { state.depth = i; refreshSidebar(); renderPage(); };
    dpOpts.appendChild(el);
  });

  // BG presets
  var bgOpts = document.getElementById("sb-bg-opts");
  BG_PRESETS.forEach(function(b, i) {
    var el = document.createElement("div");
    el.className = "sb-bg" + (i === state.bg ? " active" : "");
    el.innerHTML = '<span class="name">' + b.name + '</span><span class="desc">' + b.desc + '</span>';
    el.onclick = function() { state.bg = i; refreshSidebar(); renderPage(); };
    bgOpts.appendChild(el);
  });
}

function refreshSidebar() {
  ["sb-palette-opts","sb-type-opts","sb-easing-opts","sb-corners-opts","sb-density-opts","sb-depth-opts","sb-bg-opts"].forEach(function(id) {
    document.getElementById(id).innerHTML = "";
  });
  buildSidebar();
}

// ── Render design page into iframe ──
function renderPage() {
  if (!state.template) return;
  var slug = state.template;

  // Fetch design template
  var xhr = new XMLHttpRequest();
  xhr.open("GET", "templates/" + slug + "/design.html?t=" + Date.now(), false);
  xhr.send();
  if (xhr.status !== 200) return;

  // Fetch summary
  var sxhr = new XMLHttpRequest();
  sxhr.open("GET", "templates/" + slug + "/summary.html?t=" + Date.now(), false);
  sxhr.send();
  var summary = sxhr.status === 200 ? sxhr.responseText : "";

  // Resolve tokens
  _resolvedHtml = applyTokens(xhr.responseText, slug, summary);

  // Write to iframe
  var iframe = document.getElementById("hf-preview");
  var doc = iframe.contentDocument || iframe.contentWindow.document;
  doc.open();
  doc.write(_resolvedHtml);
  doc.close();
}

function applyTokens(html, slug, summary) {
  var p = PALETTES[state.palette];
  var t = TYPEPAIRS[state.type];
  var e = EASINGS[state.easing];
  var cr = CORNERS[state.corners];
  var dn = DENSITIES[state.density];
  var dp = DEPTHS[state.depth];
  var bg = BG_PRESETS[state.bg];
  var name = (PROMPT && PROMPT.title) || "Untitled";

  html = html.replace(/__PRIMARY__/g, p.primary);
  html = html.replace(/__SECONDARY__/g, p.secondary);
  html = html.replace(/__TERTIARY__/g, p.tertiary || "#888");
  html = html.replace(/__ACCENT__/g, p.accent);
  html = html.replace(/__PRIMARY_NAME__/g, "primary");
  html = html.replace(/__SECONDARY_NAME__/g, "secondary");
  html = html.replace(/__TERTIARY_NAME__/g, "tertiary");
  html = html.replace(/__ACCENT_NAME__/g, "accent");
  html = html.replace(/__ACCENT_LABEL__/g, "Accent " + p.accent);
  html = html.replace(/__PALETTE_LEDE__/g, "Four tokens. Primary, secondary, tertiary, accent.");
  var nameParts = name.match(/[A-Z][a-z]*/g) || [name];
  html = html.replace(/__NAME__/g, name);
  html = html.replace(/__NAME_LINE1__/g, nameParts[0] || name);
  html = html.replace(/__NAME_LINE2__/g, nameParts.slice(1).join("") || "");
  html = html.replace(/__CORNER_RADIUS__/g, cr.value);
  html = html.replace(/__PADDING__/g, dn.padding);
  html = html.replace(/__GAP__/g, dn.gap);
  html = html.replace(/__ELEVATION__/g, dp.name);
  html = html.replace(/__DENSITY__/g, dn.name + " — " + dn.desc);
  html = html.replace(/__BORDER__/g, "4px solid");
  html = html.replace(/__SHADOW__/g, "8 8 0");
  html = html.replace(/__EASING_NAME__/g, e.name.toLowerCase());
  html = html.replace(/__EASING_VALUE__/g, e.value);
  html = html.replace(/__EASING_DESC__/g, e.desc);
  html = html.replace(/__EASING_HEADLINE__/g, e.name.toLowerCase() + ".<br/>fast in.");
  html = html.replace(/__EASING_LEDE__/g, e.desc + ". Vary entrances by intent.");
  html = html.replace(/__DURATION_DEFAULT__/g, "0.8s default");
  html = html.replace(/__DURATION_DESC__/g, "Slides: 0.8s. Entrances: 0.5s.");
  html = html.replace(/__DURATION_VALUES__/g, "--dur-slide: 0.8s\n--dur-enter: 0.5s");

  if (bg && bg.type) {
    var bgColors = [p.secondary, p.accent, p.tertiary || "#888"];
    html = html.replace(/__BG_HEADLINE__/g, bg.name.toLowerCase() + ".<br/>" + bg.type + ".");
    html = html.replace(/__BG_LEDE__/g, bg.name + " shader — " + bg.type + " geometry.");
    html = html.replace(/__BG_BADGE__/g, bg.name + " \xb7 " + bg.type);
    html = html.replace(/__BG_TYPE__/g, bg.type.charAt(0).toUpperCase() + bg.type.slice(1));
    html = html.replace(/__BG_DENSITY__/g, String(bg.density));
    html = html.replace(/__BG_SPEED__/g, String(bg.speed));
    html = html.replace(/__BG_STRENGTH__/g, String(bg.strength));
    html = html.replace(/__BG_GRAIN__/g, "2 \xb7 scatter 1");
    html = html.replace(/__SHADER_CONFIG__/g, JSON.stringify({ type: bg.type, density: bg.density, speed: bg.speed, strength: bg.strength, colors: bgColors, rotation: [bg.rotX||0, bg.rotY||0, bg.rotZ||0], camera: { distance: bg.camDist, azimuth: bg.camAz, polar: bg.camPol, zoom: bg.zoom||1 }, position: [bg.posX||0, bg.posY||0, bg.posZ||0] }));
    html = html.replace(/__SHADER_VERTEX__/g, "");
    html = html.replace(/__SHADER_FRAGMENT__/g, "");
    html = html.replace(/__SHADER_SCRIPT__/g, "");
  } else {
    html = html.replace(/__BG_HEADLINE__/g, "none.");
    html = html.replace(/__BG_LEDE__/g, "No shader selected.");
    html = html.replace(/__BG_BADGE__/g, "none");
    html = html.replace(/__BG_TYPE__/g, "—");
    html = html.replace(/__BG_DENSITY__/g, "—");
    html = html.replace(/__BG_SPEED__/g, "—");
    html = html.replace(/__BG_STRENGTH__/g, "—");
    html = html.replace(/__BG_GRAIN__/g, "—");
    html = html.replace(/__SHADER_CONFIG__/g, "{}");
    html = html.replace(/__SHADER_VERTEX__/g, "");
    html = html.replace(/__SHADER_FRAGMENT__/g, "");
    html = html.replace(/__SHADER_SCRIPT__/g, "");
  }

  var dos = [
    "Use accent (" + p.accent + ") for exactly the element the viewer should remember",
    "Maintain corners (" + cr.value + ") on every container",
    "Keep headline weight consistent",
    "Use the body font for all readable text",
    "Tint neutrals toward the accent hue"
  ];
  var donts = [
    "Don’t introduce a second accent color",
    "Don’t use accent for background fills",
    "Don’t use body text under 24px in video",
    "Don’t repeat the same entrance animation",
    "Don’t use pure #000 for canvas"
  ];
  html = html.replace(/__DOS__/g, dos.map(function(d) { return "<li>" + d + "</li>"; }).join("\n"));
  html = html.replace(/__DONTS__/g, donts.map(function(d) { return "<li>" + d + "</li>"; }).join("\n"));

  // Template CSS + slide cards
  if (summary) {
    var styleMatch = summary.match(/<style[\s\S]*?<\/style>/);
    var skeletonHtml = summary.replace(/<style[\s\S]*?<\/style>/, "").replace(/<link[^>]*>/g, "").trim();
    if (styleMatch) {
      var tmplCss = styleMatch[0].replace(/<\/?style[^>]*>/g, "");
      tmplCss = tmplCss.replace(/--tp-primary:\s*[^;]+;/g, "--tp-primary: var(--primary);");
      tmplCss = tmplCss.replace(/--tp-secondary:\s*[^;]+;/g, "--tp-secondary: var(--secondary);");
      tmplCss = tmplCss.replace(/--tp-tertiary:\s*[^;]+;/g, "--tp-tertiary: var(--tertiary);");
      tmplCss = tmplCss.replace(/--tp-accent:\s*[^;]+;/g, "--tp-accent: var(--accent);");
      var scoped = tmplCss
        .replace(/:root\s*\{/g, ".ds-slide-frame {")
        .replace(/^\s*\*\s*,/gm, ".ds-slide-frame *,")
        .replace(/^\s*\*\s*\{/gm, ".ds-slide-frame * {")
        .replace(/\*::before/g, ".ds-slide-frame *::before")
        .replace(/\*::after/g, ".ds-slide-frame *::after")
        .replace(/^(\s*)(\.[\w-])/gm, "$1.ds-slide-frame $2")
        .replace(/^(\s*)(section|h1|h2|h3|p|ul|li|a|span|svg|div)(\s*[{,.])/gm, "$1.ds-slide-frame $2$3")
        .replace(/\.ds-slide-frame \.ds-slide-frame/g, ".ds-slide-frame");
      scoped += "\n.ds-slide-frame .slide,.ds-slide-frame section{display:flex!important;opacity:1!important;position:relative!important;width:1920px!important;height:1080px!important}";
      scoped += "\n.ds-slide-frame .slide.dark{background:" + p.secondary + "!important;color:" + p.primary + "!important}";
      scoped += "\n.ds-slide-frame .slide.orange{background:" + p.accent + "!important}";
      scoped += "\n.ds-slide-frame .slide.light{background:" + p.primary + "!important;color:" + p.secondary + "!important}";
      html = html.replace(/__TEMPLATE_CSS__/g, scoped);
    } else {
      html = html.replace(/__TEMPLATE_CSS__/g, "");
    }
    var blocks = skeletonHtml.split(/(?=<!-- )/);
    var cards = "", idx = 0, total = blocks.filter(function(b) { return b.trim() && /<!-- [\w-]+ -->/.test(b); }).length;
    blocks.forEach(function(block) {
      block = block.trim();
      if (!block) return;
      var nm = block.match(/<!-- ([\w-]+) -->/);
      if (!nm) return;
      var skel = block.replace(/<!-- [\w-]+ -->\s*/, "");
      if (!skel.trim()) return;
      idx++;
      cards += '<div class="tmpl" data-idx="' + String(idx).padStart(2,"0") + '"><div class="tmpl-thumb"><div class="scale-wrap"><div class="ds-slide-frame">\n' + skel + '\n</div></div></div><div class="tmpl-foot"><span class="name">' + nm[1] + '</span><span class="idx">' + String(idx).padStart(2,"0") + " / " + total + '</span></div></div>\n';
    });
    html = html.replace(/__SLIDE_CARDS__/g, cards);
    html = html.replace(/__SLIDE_COUNT__/g, String(idx));
    var words = ["zero","one","two","three","four","five","six","seven","eight","nine","ten","eleven","twelve","thirteen","fourteen","fifteen","sixteen","seventeen","eighteen","nineteen","twenty"];
    html = html.replace(/__SLIDE_COUNT_WORD__/g, words[idx] || String(idx));
  } else {
    html = html.replace(/__TEMPLATE_CSS__/g, "");
    html = html.replace(/__SLIDE_CARDS__/g, "");
    html = html.replace(/__SLIDE_COUNT__/g, "0");
    html = html.replace(/__SLIDE_COUNT_WORD__/g, "zero");
  }
  html = html.replace(/__FONT_LINK_EXTRA__/g, "");
  html = html.replace(/__DATE__/g, new Date().toLocaleDateString("en-US", { month: "long", year: "numeric" }));
  return html;
}

// ── Export ──
function exportDesign() {
  document.getElementById("hf-export-output").value = _resolvedHtml;
  document.getElementById("hf-export-overlay").classList.add("visible");
}
function copyExport() {
  navigator.clipboard.writeText(document.getElementById("hf-export-output").value);
}
function downloadExport() {
  var blob = new Blob([_resolvedHtml], { type: "text/html" });
  var a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = (state.template || "design") + ".html";
  a.click();
  URL.revokeObjectURL(a.href);
}

// ── Init ──
buildGrid();
buildSidebar();
</script>
