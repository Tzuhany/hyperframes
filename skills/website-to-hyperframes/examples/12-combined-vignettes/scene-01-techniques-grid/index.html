<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>scene-01-techniques-grid</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@500;700&display=swap"
    rel="stylesheet"
  />
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; }

    #scene-01-techniques-grid {
      position: relative;
      overflow: hidden;
      background: #050505;
      color: #f5f5f7;
      font-family: "Space Grotesk", "Inter", sans-serif;
      --bg: #050505;
      --ink: #f5f5f7;
      --cyan: #22d3ee;
      --magenta: #ec4899;
      --amber: #f59e0b;
      --green: #22c55e;
      --violet: #8b5cf6;
      --red: #ef4444;
      --blue: #3b82f6;
      --indigo: #6366f1;
      --orb: #e8a769;
    }

    #scene-01-techniques-grid .scene {
      position: absolute;
      top: 0; left: 0;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
    }
    #scene-01-techniques-grid .scene-content {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    #scene-01-techniques-grid .vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,0.7) 100%);
      pointer-events: none;
      z-index: 50;
    }

    #scene-01-techniques-grid .grid {
      display: grid;
      grid-template-columns: repeat(6, 250px);
      grid-template-rows: repeat(4, 250px);
      gap: 16px;
    }
    #scene-01-techniques-grid .square {
      width: 250px;
      height: 250px;
      position: relative;
      overflow: hidden;
      background: #08080c;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.04);
    }
    #scene-01-techniques-grid .square.feature {
      border-color: rgba(245,158,11,0.25);
      box-shadow: 0 0 50px rgba(245,158,11,0.18);
    }

    #scene-01-techniques-grid .rings {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, #0a1220, #050505);
    }
    #scene-01-techniques-grid .ring {
      position: absolute;
      border-radius: 50%;
      border: 3px solid;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      transform-origin: center;
    }

    #scene-01-techniques-grid .stripes {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(45deg,
        var(--indigo) 0, var(--indigo) 10px,
        #0f1117 10px, #0f1117 20px);
      background-size: 200% 200%;
    }

    #scene-01-techniques-grid .dots {
      position: absolute;
      inset: -30px;
      background: radial-gradient(circle, #94a3b8 2px, transparent 2.5px);
      background-size: 26px 26px;
    }

    #scene-01-techniques-grid .burst {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: radial-gradient(circle at center, #1a0a14, #050505);
    }
    #scene-01-techniques-grid .burst-inner { position: relative; width: 1px; height: 1px; }
    #scene-01-techniques-grid .ray {
      position: absolute;
      top: -110px; left: -1px;
      width: 2px;
      height: 220px;
      background: linear-gradient(to bottom, transparent 0%, #f59e0b 50%, transparent 100%);
      transform-origin: 50% 50%;
    }

    #scene-01-techniques-grid .orb-wrap {
      position: absolute; inset: 0;
      background: radial-gradient(circle at center, #1a0a05, #050505 70%);
    }
    #scene-01-techniques-grid .orb {
      position: absolute; inset: 0;
      background: radial-gradient(circle at center, var(--orb) 0%, rgba(232,167,105,0.4) 30%, transparent 70%);
      filter: blur(40px);
    }
    #scene-01-techniques-grid .orb-core {
      position: absolute; inset: 0;
      background: radial-gradient(circle at center, rgba(255,220,180,0.95) 0%, transparent 25%);
    }

    #scene-01-techniques-grid .waves {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; justify-content: center; gap: 0;
      background: linear-gradient(180deg, #050818, #050505);
    }
    #scene-01-techniques-grid .wave { height: 28px; margin-top: -7px; }
    #scene-01-techniques-grid .wave svg { width: 100%; height: 100%; display: block; }

    #scene-01-techniques-grid .rain {
      position: absolute; inset: 0;
      display: flex; gap: 1px; padding: 0 2px;
      background: #020a05;
      overflow: hidden;
    }
    #scene-01-techniques-grid .rain-col {
      flex: 1;
      font-family: "JetBrains Mono", monospace;
      font-size: 9px;
      line-height: 11px;
      color: var(--green);
      opacity: 0.32;
      white-space: pre;
      text-align: center;
    }

    #scene-01-techniques-grid .maze {
      position: absolute; inset: 0;
      background-color: #0a0a0e;
      background-image:
        linear-gradient(0deg, transparent 24%, rgba(148,163,184,0.5) 25%, rgba(148,163,184,0.5) 26%, transparent 27%, transparent 74%, rgba(148,163,184,0.5) 75%, rgba(148,163,184,0.5) 76%, transparent 77%),
        linear-gradient(90deg, transparent 24%, rgba(148,163,184,0.5) 25%, rgba(148,163,184,0.5) 26%, transparent 27%, transparent 74%, rgba(148,163,184,0.5) 75%, rgba(148,163,184,0.5) 76%, transparent 77%);
      background-size: 30px 30px;
    }

    #scene-01-techniques-grid .blob-wrap {
      position: absolute; inset: 0;
      background: radial-gradient(circle at 30% 30%, #1a1f2e, #050505);
    }
    #scene-01-techniques-grid .blob-wrap svg { width: 100%; height: 100%; }

    #scene-01-techniques-grid .kinetic {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #1a0533, #050505 70%);
      perspective: 600px;
    }
    #scene-01-techniques-grid .kinetic-word {
      font-family: "Space Grotesk", sans-serif;
      font-weight: 700;
      font-size: 44px;
      letter-spacing: -0.03em;
      color: var(--magenta);
      text-shadow: 0 0 20px rgba(236,72,153,0.6);
      display: flex;
      gap: 2px;
      transform-style: preserve-3d;
    }
    #scene-01-techniques-grid .kinetic-char {
      display: inline-block;
      transform-style: preserve-3d;
      will-change: transform;
    }

    #scene-01-techniques-grid .cube-stage {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      perspective: 700px;
      background: radial-gradient(circle at center, #0a1628, #050505);
    }
    #scene-01-techniques-grid .cube {
      position: relative;
      width: 100px; height: 100px;
      transform-style: preserve-3d;
      transform: rotateX(-25deg) rotateY(0deg);
    }
    #scene-01-techniques-grid .face {
      position: absolute;
      width: 100px; height: 100px;
      border: 2px solid rgba(255,255,255,0.85);
      display: flex; align-items: center; justify-content: center;
      font-family: "JetBrains Mono", monospace;
      font-size: 26px; font-weight: 700;
      text-shadow: 0 0 6px currentColor;
    }
    #scene-01-techniques-grid .f-front  { transform: translateZ(50px);                background: rgba(34,211,238,0.18);  color: var(--cyan); }
    #scene-01-techniques-grid .f-back   { transform: rotateY(180deg) translateZ(50px); background: rgba(236,72,153,0.18); color: var(--magenta); }
    #scene-01-techniques-grid .f-right  { transform: rotateY(90deg)  translateZ(50px); background: rgba(245,158,11,0.18); color: var(--amber); }
    #scene-01-techniques-grid .f-left   { transform: rotateY(-90deg) translateZ(50px); background: rgba(34,197,94,0.18);  color: var(--green); }
    #scene-01-techniques-grid .f-top    { transform: rotateX(90deg)  translateZ(50px); background: rgba(139,92,246,0.18); color: var(--violet); }
    #scene-01-techniques-grid .f-bottom { transform: rotateX(-90deg) translateZ(50px); background: rgba(239,68,68,0.18);  color: var(--red); }

    #scene-01-techniques-grid .spiro {
      position: absolute; inset: 0;
      background: radial-gradient(circle at center, #1a0a1f, #050505);
    }
    #scene-01-techniques-grid .spiro svg { width: 100%; height: 100%; }

    #scene-01-techniques-grid .vortex {
      position: absolute; inset: 0;
      background: radial-gradient(circle at center, #1a0a2e 0%, #050505 70%);
      overflow: hidden;
    }
    #scene-01-techniques-grid .vortex-core {
      position: absolute; top: 50%; left: 50%;
      width: 50px; height: 50px;
      margin: -25px 0 0 -25px;
      border-radius: 50%;
      background: radial-gradient(circle, #fff 0%, var(--amber) 30%, transparent 70%);
      filter: blur(7px);
      z-index: 2;
    }
    #scene-01-techniques-grid .particle {
      position: absolute; top: 50%; left: 50%;
      width: 4px; height: 4px;
      margin: -2px 0 0 -2px;
      border-radius: 50%;
      background: var(--amber);
      box-shadow: 0 0 6px var(--amber);
      will-change: transform, opacity;
    }

    #scene-01-techniques-grid .glitch-wrap {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(180deg, #0a0a0e, #1a0a14);
      overflow: hidden;
    }
    #scene-01-techniques-grid .glitch-text {
      font-family: "JetBrains Mono", monospace;
      font-weight: 700;
      font-size: 28px;
      letter-spacing: 0.04em;
      color: #fff;
      position: relative;
    }
    #scene-01-techniques-grid .glitch-layer {
      position: absolute; top: 0; left: 0; right: 0;
      text-align: center;
      mix-blend-mode: screen;
      will-change: transform;
    }
    #scene-01-techniques-grid .glitch-r { color: #ff0040; }
    #scene-01-techniques-grid .glitch-g { color: #00ffaa; }
    #scene-01-techniques-grid .glitch-b { color: #00aaff; }
    #scene-01-techniques-grid .scanline {
      position: absolute; left: 0; right: 0;
      height: 12px;
      background: linear-gradient(180deg, transparent, rgba(255,255,255,0.1) 50%, transparent);
      pointer-events: none;
      will-change: transform;
    }

    #scene-01-techniques-grid .audio {
      position: absolute; inset: 0;
      background: linear-gradient(180deg, #050818, #050505);
      display: flex; align-items: center; justify-content: center;
      gap: 3px; padding: 0 14px;
    }
    #scene-01-techniques-grid .bar {
      flex: 1;
      background: linear-gradient(180deg, var(--cyan), var(--violet));
      border-radius: 2px 2px 0 0;
      transform-origin: bottom;
      height: 60%;
      max-width: 7px;
      box-shadow: 0 0 6px rgba(34,211,238,0.5);
    }

    #scene-01-techniques-grid .globe-stage {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: radial-gradient(circle at center, #0a1224, #050505);
      perspective: 700px;
    }
    #scene-01-techniques-grid .globe-wrap {
      width: 170px; height: 170px;
      position: relative;
      transform-style: preserve-3d;
    }
    #scene-01-techniques-grid .globe-wrap svg {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      overflow: visible;
    }
    #scene-01-techniques-grid .globe-orbit {
      position: absolute; inset: 0;
      border-radius: 50%;
      border: 1px solid rgba(34,211,238,0.5);
      box-shadow: inset 0 0 25px rgba(34,211,238,0.15), 0 0 18px rgba(34,211,238,0.2);
    }
    #scene-01-techniques-grid .merid {
      position: absolute; top: 0; left: 50%;
      width: 170px; height: 170px;
      margin-left: -85px;
      border-radius: 50%;
      border: 1px solid rgba(34,211,238,0.45);
    }
    #scene-01-techniques-grid .ping {
      position: absolute;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--magenta);
      box-shadow: 0 0 8px var(--magenta);
      top: 50%; left: 50%;
      margin: -2.5px 0 0 -2.5px;
    }

    #scene-01-techniques-grid .clock-stage {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: radial-gradient(circle at center, #1a1410, #050505);
    }
    #scene-01-techniques-grid .clock-face {
      width: 180px; height: 180px;
      border-radius: 50%;
      border: 2px solid rgba(245,158,11,0.5);
      box-shadow: inset 0 0 20px rgba(245,158,11,0.15), 0 0 20px rgba(245,158,11,0.2);
      position: relative;
    }
    #scene-01-techniques-grid .tick {
      position: absolute;
      top: 6px; left: 50%;
      width: 2px; height: 10px;
      background: rgba(245,158,11,0.7);
      transform-origin: 1px 84px;
    }
    #scene-01-techniques-grid .hand {
      position: absolute;
      left: 50%; top: 50%;
      background: var(--amber);
      transform-origin: 50% 100%;
      border-radius: 2px;
    }
    #scene-01-techniques-grid .hand.hour   { width: 4px; height: 50px; margin: -50px 0 0 -2px; }
    #scene-01-techniques-grid .hand.minute { width: 3px; height: 70px; margin: -70px 0 0 -1.5px; background: #fde68a; }
    #scene-01-techniques-grid .hand.second { width: 1.5px; height: 78px; margin: -78px 0 0 -0.75px; background: var(--red); }
    #scene-01-techniques-grid .clock-center {
      position: absolute; top: 50%; left: 50%;
      width: 10px; height: 10px;
      margin: -5px 0 0 -5px;
      border-radius: 50%;
      background: var(--amber);
      z-index: 4;
    }

    #scene-01-techniques-grid .stock {
      position: absolute; inset: 0;
      background: linear-gradient(180deg, #051a10, #050505);
      padding: 18px;
    }
    #scene-01-techniques-grid .stock-label {
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      color: rgba(34,197,94,0.6);
      letter-spacing: 0.15em;
    }
    #scene-01-techniques-grid .stock-price {
      font-family: "Space Grotesk", sans-serif;
      font-weight: 700;
      font-size: 26px;
      color: var(--green);
      letter-spacing: -0.02em;
      margin-top: 2px;
    }
    #scene-01-techniques-grid .stock-delta {
      font-family: "JetBrains Mono", monospace;
      font-size: 10px;
      color: var(--green);
    }
    #scene-01-techniques-grid .stock-chart {
      position: absolute;
      left: 0; right: 0; bottom: 18px;
      height: 130px;
    }

    #scene-01-techniques-grid .nn {
      position: absolute; inset: 0;
      background: radial-gradient(circle at center, #0a0f1a, #050505);
    }
    #scene-01-techniques-grid .nn svg { width: 100%; height: 100%; }

    #scene-01-techniques-grid .spinners {
      position: absolute; inset: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      background: linear-gradient(135deg, #0a0a14, #050505);
      padding: 14px;
      gap: 6px;
    }
    #scene-01-techniques-grid .spin-cell {
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    #scene-01-techniques-grid .spin-ring {
      width: 52px; height: 52px;
      border-radius: 50%;
      border: 3px solid rgba(34,211,238,0.18);
      border-top-color: var(--cyan);
    }
    #scene-01-techniques-grid .spin-dots { display: flex; gap: 6px; }
    #scene-01-techniques-grid .spin-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--magenta);
    }
    #scene-01-techniques-grid .spin-bars { display: flex; gap: 4px; align-items: center; }
    #scene-01-techniques-grid .spin-bar {
      width: 4px; height: 30px;
      background: var(--amber);
      border-radius: 2px;
      transform-origin: center;
    }
    #scene-01-techniques-grid .spin-pulse {
      width: 50px; height: 50px;
      border-radius: 50%;
      background: var(--violet);
      position: relative;
    }
    #scene-01-techniques-grid .spin-pulse::after {
      content: "";
      position: absolute; inset: 0;
      border-radius: 50%;
      border: 2px solid var(--violet);
    }

    #scene-01-techniques-grid .qr {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: #f5f5f7;
    }
    #scene-01-techniques-grid .qr-grid {
      width: 180px; height: 180px;
      display: grid;
      grid-template-columns: repeat(21, 1fr);
      grid-template-rows: repeat(21, 1fr);
      gap: 1px;
    }
    #scene-01-techniques-grid .qr-cell { background: #0a0a0a; }
    #scene-01-techniques-grid .qr-cell.empty { background: transparent; }

    #scene-01-techniques-grid .code {
      position: absolute; inset: 0;
      background: #0a0a14;
      padding: 12px 14px;
      font-family: "JetBrains Mono", monospace;
      font-size: 10px;
      line-height: 1.5;
      overflow: hidden;
    }
    #scene-01-techniques-grid .code-bar {
      display: flex; align-items: center; gap: 5px;
      padding-bottom: 8px;
      margin-bottom: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    #scene-01-techniques-grid .code-dot { width: 6px; height: 6px; border-radius: 50%; }
    #scene-01-techniques-grid .code-file {
      font-size: 8px;
      color: rgba(255,255,255,0.4);
      margin-left: 6px;
      letter-spacing: 0.1em;
    }
    #scene-01-techniques-grid .code-line {
      white-space: pre;
      color: rgba(255,255,255,0.7);
      opacity: 0;
    }
    #scene-01-techniques-grid .tok-kw  { color: #c084fc; }
    #scene-01-techniques-grid .tok-fn  { color: #60a5fa; }
    #scene-01-techniques-grid .tok-str { color: #fb923c; }
    #scene-01-techniques-grid .tok-num { color: #34d399; }
    #scene-01-techniques-grid .tok-com { color: rgba(255,255,255,0.3); font-style: italic; }
    #scene-01-techniques-grid .code-gut { color: rgba(255,255,255,0.15); margin-right: 8px; }

    #scene-01-techniques-grid .weather {
      position: absolute; inset: 0;
      background: linear-gradient(180deg, #051626 0%, #0a1f3a 60%, #050a14 100%);
      overflow: hidden;
    }
    #scene-01-techniques-grid .weather-info {
      position: absolute;
      left: 16px; bottom: 14px;
      z-index: 3;
    }
    #scene-01-techniques-grid .weather-temp {
      font-family: "Space Grotesk", sans-serif;
      font-weight: 500;
      font-size: 44px;
      color: #fff;
      letter-spacing: -0.04em;
      line-height: 1;
    }
    #scene-01-techniques-grid .weather-city {
      font-family: "JetBrains Mono", monospace;
      font-size: 10px;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.12em;
      margin-top: 4px;
    }
    #scene-01-techniques-grid .cloud {
      position: absolute;
      top: 30px; right: 20px;
      width: 70px; height: 40px;
      background: rgba(255,255,255,0.85);
      border-radius: 20px;
      z-index: 2;
    }
    #scene-01-techniques-grid .cloud::before, #scene-01-techniques-grid .cloud::after {
      content: "";
      position: absolute;
      background: rgba(255,255,255,0.85);
      border-radius: 50%;
    }
    #scene-01-techniques-grid .cloud::before {
      width: 30px; height: 30px;
      top: -12px; left: 12px;
    }
    #scene-01-techniques-grid .cloud::after {
      width: 22px; height: 22px;
      top: -8px; left: 38px;
    }
    #scene-01-techniques-grid .raindrop {
      position: absolute;
      width: 2px; height: 10px;
      background: linear-gradient(180deg, transparent, #93c5fd);
      border-radius: 1px;
      opacity: 0.7;
    }

    #scene-01-techniques-grid .dna {
      position: absolute; inset: 0;
      background: radial-gradient(circle at center, #0a0018, #050505);
      display: flex; align-items: center; justify-content: center;
    }
    #scene-01-techniques-grid .dna svg { width: 100%; height: 100%; }

    #scene-01-techniques-grid .scene-label {
      position: absolute;
      left: 48px;
      bottom: 48px;
      font-family: "Inter", sans-serif;
      font-size: 16px;
      color: #707070;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 500;
      z-index: 100;
    }
    #scene-01-techniques-grid .scene-label .accent { color: #f5f5f5; font-weight: 600; }
  </style>
</head>
<body>

  <div id="scene-01-techniques-grid"
       data-composition-id="scene-01-techniques-grid"
       data-start="0"
       data-duration="4"
       data-width="1920"
       data-height="1080"
       style="width:1920px; height:1080px;">

    <div class="scene clip" id="s1">
      <div class="vignette"></div>
      <div class="scene-content">
        <div class="grid">

          <!-- ROW 1 -->
          <div class="square" id="sqL0">
            <div class="clock-stage">
              <div class="clock-face" id="clock-face">
                <div class="clock-center"></div>
                <div class="hand hour"   id="hand-h"></div>
                <div class="hand minute" id="hand-m"></div>
                <div class="hand second" id="hand-s"></div>
              </div>
            </div>
          </div>
          <div class="square" id="sq00" data-row="0" data-col="0">
            <div class="rings" id="rings"></div>
          </div>
          <div class="square" id="sq01" data-row="0" data-col="1">
            <div class="stripes" id="stripes"></div>
          </div>
          <div class="square" id="sq02" data-row="0" data-col="2">
            <div class="cube-stage">
              <div class="cube" id="cube">
                <div class="face f-front">+</div>
                <div class="face f-back">&times;</div>
                <div class="face f-right">&#9670;</div>
                <div class="face f-left">&#9675;</div>

  <script>
    (function () {
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      var root = document.getElementById("scene-01-techniques-grid");
      function $(id) { return root.querySelector("#" + id); }

      // Concentric rings
      (function() {
        var c = $("rings");
        var colors = ["#3b82f6", "#1e293b"];
        for (var i = 12; i >= 1; i--) {
          var r = document.createElement("div");
          r.className = "ring";
          var size = i * 18;
          r.style.width = size + "px";
          r.style.height = size + "px";
          r.style.borderColor = colors[i % 2];
          r.style.borderWidth = "3px";
          r.id = "ring-" + i;
          c.appendChild(r);
        }
      })();

      // Radial burst rays
      (function() {
        var c = $("burst");
        for (var i = 0; i < 24; i++) {
          var ray = document.createElement("div");
          ray.className = "ray";
          ray.style.transform = "rotate(" + (i * 15) + "deg)";
          c.appendChild(ray);
        }
      })();

      // Sine waves — build SVG via DOM API (no innerHTML)
      (function() {
        var c = $("waves");
        var palette = ["#3b82f6", "#6366f1", "#e8a769", "#22c55e", "#ef4444"];
        var svgns = "http://www.w3.org/2000/svg";
        for (var i = 0; i < 5; i++) {
          var wrap = document.createElement("div");
          wrap.className = "wave";
          wrap.id = "wave-" + i;
          var pts = [];
          var amp = 9, period = 60;
          for (var x = 0; x <= 230; x += 4) {
            var y = 14 + amp * Math.sin((x / period) * Math.PI * 2 + i * 0.7);
            pts.push((x === 0 ? "M" : "L") + " " + x + " " + y.toFixed(2));
          }
          var svgEl = document.createElementNS(svgns, "svg");
          svgEl.setAttribute("viewBox", "0 0 230 28");
          svgEl.setAttribute("preserveAspectRatio", "none");
          var pathEl = document.createElementNS(svgns, "path");
          pathEl.setAttribute("d", pts.join(" "));
          pathEl.setAttribute("stroke", palette[i]);
          pathEl.setAttribute("stroke-width", "2");
          pathEl.setAttribute("fill", "none");
          pathEl.setAttribute("stroke-linecap", "round");
          svgEl.appendChild(pathEl);
          wrap.appendChild(svgEl);
          c.appendChild(wrap);
        }
      })();

      // Seeded RNG for deterministic builds
      function rng(seed) {
        return function() {
          seed = (seed + 0x6d2b79f5) | 0;
          var t = seed;
          t = Math.imul(t ^ (t >>> 15), t | 1);
          t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }

      // Binary rain
      (function() {
        var rand = rng(42);
        var c = $("rain");
        var numCols = 22;
        for (var col = 0; col < numCols; col++) {
          var d = document.createElement("div");
          d.className = "rain-col";
          d.id = "rain-" + col;
          var s = "";
          for (var r = 0; r < 60; r++) s += (rand() < 0.5 ? "0" : "1") + "\n";
          d.textContent = s;
          d.style.transform = "translateY(-" + (rand() * 200) + "px)";
          c.appendChild(d);
        }
      })();

      // Particle vortex
      (function() {
        var v = $("vortex");
        var N = 80;
        for (var i = 0; i < N; i++) {
          var p = document.createElement("div");
          p.className = "particle";
          var hueRoll = (i * 47) % 100;
          var color;
          if (hueRoll < 33) color = "#f59e0b";
          else if (hueRoll < 66) color = "#ec4899";
          else color = "#22d3ee";
          p.style.background = color;
          p.style.boxShadow = "0 0 6px " + color;
          var size = 2 + (i % 4);
          p.style.width = size + "px";
          p.style.height = size + "px";
          p.style.marginLeft = (-size/2) + "px";
          p.style.marginTop = (-size/2) + "px";
          v.appendChild(p);
        }
      })();

      // Audio bars
      (function() {
        var c = $("audio");
        for (var i = 0; i < 24; i++) {
          var b = document.createElement("div");
          b.className = "bar";
          b.id = "bar-" + i;
          c.appendChild(b);
        }
      })();

      // Clock ticks
      (function() {
        var face = $("clock-face");
        for (var i = 0; i < 12; i++) {
          var t = document.createElement("div");
          t.className = "tick";
          t.style.transform = "rotate(" + (i * 30) + "deg)";
          face.appendChild(t);
        }
      })();

      // Neural network nodes + edges
      var nnEdgeCount = 0, nnNodeCount = 0;
      (function() {
        var svg = $("nn-svg");
        var layers = [3, 5, 5, 3];
        var nodes = [];
        var W = 250, H = 250;
        layers.forEach(function(count, L) {
          var x = 30 + (L * (W - 60) / (layers.length - 1));
          var nodeRow = [];
          for (var i = 0; i < count; i++) {
            var y = (H / (count + 1)) * (i + 1);
            nodeRow.push({ x: x, y: y });
          }
          nodes.push(nodeRow);
        });
        var edgeIdx = 0;
        for (var L = 0; L < nodes.length - 1; L++) {
          for (var a = 0; a < nodes[L].length; a++) {
            for (var b = 0; b < nodes[L+1].length; b++) {
              var na = nodes[L][a], nb = nodes[L+1][b];
              var line = document.createElementNS("http://www.w3.org/2000/svg", "line");
              line.setAttribute("x1", na.x); line.setAttribute("y1", na.y);
              line.setAttribute("x2", nb.x); line.setAttribute("y2", nb.y);
              line.setAttribute("stroke", "rgba(139,92,246,0.25)");
              line.setAttribute("stroke-width", "1");
              line.id = "nn-e" + edgeIdx;
              svg.appendChild(line);
              edgeIdx++;
            }
          }
        }
        var nIdx = 0;
        nodes.forEach(function(row) {
          row.forEach(function(n) {
            var c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            c.setAttribute("cx", n.x); c.setAttribute("cy", n.y);
            c.setAttribute("r", 5);
            c.setAttribute("fill", "#8b5cf6");
            c.setAttribute("filter", "drop-shadow(0 0 4px #8b5cf6)");
            c.id = "nn-n" + nIdx;
            svg.appendChild(c);
            nIdx++;
          });
        });
        nnNodeCount = nIdx;
        nnEdgeCount = edgeIdx;
      })();

      // QR grid (21x21 deterministic pattern)
      (function() {
        var rand = rng(123);
        var grid = $("qr-grid");
        var N = 21;
        function isFinder(r, c) {
          function inCorner(rr, cc) {
            return rr >= 0 && rr < 7 && cc >= 0 && cc < 7;
          }
          return inCorner(r, c) || inCorner(r, c - (N-7)) || inCorner(r - (N-7), c);
        }
        function finderFill(r, c) {
          var rr = r >= N-7 ? r - (N-7) : r;
          var cc = c >= N-7 ? c - (N-7) : c;
          if (rr === 0 || rr === 6 || cc === 0 || cc === 6) return true;
          if (rr >= 2 && rr <= 4 && cc >= 2 && cc <= 4) return true;
          return false;
        }
        for (var r = 0; r < N; r++) {
          for (var c = 0; c < N; c++) {
            var cell = document.createElement("div");
            cell.className = "qr-cell";
            var fill;
            if (isFinder(r, c)) {
              fill = finderFill(r, c);
            } else {
              fill = rand() < 0.5;
            }
            if (!fill) cell.classList.add("empty");
            cell.style.opacity = "0";
            cell.dataset.idx = r * N + c;
            grid.appendChild(cell);
          }
        }
      })();

      // Weather raindrops
      (function() {
        var w = $("weather");
        for (var i = 0; i < 20; i++) {
          var d = document.createElement("div");
          d.className = "raindrop";
          d.style.left = (15 + (i * 11) % 220) + "px";
          d.style.top = "60px";
          d.dataset.delay = (i * 0.08) % 1.6;
          w.appendChild(d);
        }
      })();

      // DNA helix
      var dnaN = 0;
      (function() {
        var svg = $("dna-svg");
        var N = 14;
        for (var i = 0; i < N; i++) {
          var t = i / (N - 1);
          var y = 20 + t * 210;
          var phase = t * Math.PI * 4;
          var x1 = 125 + Math.cos(phase) * 55;
          var x2 = 125 + Math.cos(phase + Math.PI) * 55;
          var rung = document.createElementNS("http://www.w3.org/2000/svg", "line");
          rung.setAttribute("x1", x1); rung.setAttribute("y1", y);
          rung.setAttribute("x2", x2); rung.setAttribute("y2", y);
          rung.setAttribute("stroke", i % 2 ? "#ec4899" : "#22d3ee");
          rung.setAttribute("stroke-width", "1.5");
          rung.setAttribute("opacity", "0.6");
          rung.id = "dna-r" + i;
          svg.appendChild(rung);
          var c1 = document.createElementNS("http://www.w3.org/2000/svg", "circle");
          c1.setAttribute("cx", x1); c1.setAttribute("cy", y);
          c1.setAttribute("r", 5);
          c1.setAttribute("fill", "#22d3ee");
          c1.setAttribute("filter", "drop-shadow(0 0 3px #22d3ee)");
          c1.id = "dna-a" + i;
          svg.appendChild(c1);
          var c2 = document.createElementNS("http://www.w3.org/2000/svg", "circle");
          c2.setAttribute("cx", x2); c2.setAttribute("cy", y);
          c2.setAttribute("r", 5);
          c2.setAttribute("fill", "#ec4899");
          c2.setAttribute("filter", "drop-shadow(0 0 3px #ec4899)");
          c2.id = "dna-b" + i;
          svg.appendChild(c2);
        }
        dnaN = N;
      })();

      // ===== Grid entrance — staggered from [1,1] outward (Chebyshev distance) =====
      var distance = {
        sq11: 0,
        sq00: 1, sq01: 1, sq02: 1,
        sq10: 1,           sq12: 1,
        sq20: 1, sq21: 1, sq22: 1,
        sq03: 2, sq13: 2, sq23: 2,
        sq30: 2, sq31: 2, sq32: 2, sq33: 2,
        sqL0: 2, sqL1: 2, sqL2: 2, sqL3: 2,
        sqR0: 3, sqR1: 3, sqR2: 3, sqR3: 3,
      };

      function sel(id) { return "#scene-01-techniques-grid #" + id; }

      gsap.set("#scene-01-techniques-grid .square", { scale: 0.8, autoAlpha: 0, transformOrigin: "center center" });

      Object.keys(distance).forEach(function(id) {
        var d = distance[id];
        tl.to(sel(id), {
          scale: 1, autoAlpha: 1,
          duration: 0.5, ease: "back.out(1.6)",
        }, d * 0.06);
      });

      function intStart(id) { return distance[id] * 0.06 + 0.2; }

      // ===== 1. Rings pulse (sq00) =====
      var ringStart = intStart("sq00");
      for (var i = 1; i <= 12; i++) {
        tl.to(sel("ring-" + i), {
          scale: 1.2,
          duration: 0.9,
          ease: "sine.inOut",
          yoyo: true, repeat: 2,
          transformOrigin: "center center",
        }, ringStart + i * 0.04);
      }

      // ===== 2. Stripes drift (sq01) =====
      tl.to(sel("stripes"), {
        backgroundPosition: "120px 120px",
        duration: 3.0, ease: "none",
      }, intStart("sq01"));

      // ===== 3. 3D cube rotation (sq02) =====
      tl.fromTo(sel("cube"),
        { rotationX: -25, rotationY: 0 },
        { rotationY: 720, duration: 3.2, ease: "power1.inOut" },
        intStart("sq02")
      );

      // ===== 4. Dots drift (sq03) =====
      tl.to(sel("dots"), {
        backgroundPosition: "60px 40px",
        duration: 3.0, ease: "sine.inOut",
      }, intStart("sq03"));

      // ===== 5. Liquid blob (sq10) =====
      var blobT = intStart("sq10");
      tl.to(sel("b2"), { x: 22, y: -16, duration: 1.6, ease: "sine.inOut", yoyo: true, repeat: 1 }, blobT);
      tl.to(sel("b3"), { x: -18, y: 14, duration: 1.7, ease: "sine.inOut", yoyo: true, repeat: 1 }, blobT);
      tl.to(sel("b4"), { x: 14, y: 18, duration: 1.5, ease: "sine.inOut", yoyo: true, repeat: 1 }, blobT + 0.1);
      tl.to(sel("b5"), { x: -22, y: -10, duration: 1.8, ease: "sine.inOut", yoyo: true, repeat: 1 }, blobT);
      tl.to(sel("b1"), { scale: 1.1, transformOrigin: "115px 115px", duration: 1.5, ease: "sine.inOut", yoyo: true, repeat: 1 }, blobT);

      // ===== 6. Particle vortex (sq11 — FEATURE) =====
      (function() {
        var particles = root.querySelectorAll("#vortex .particle");
        var rand = rng(7);
        var baseT = intStart("sq11");
        particles.forEach(function(p, i) {
          var startAngle = (i / particles.length) * Math.PI * 2 + rand() * 0.5;
          var startR = 110 + rand() * 25;
          var startX = Math.cos(startAngle) * startR;
          var startY = Math.sin(startAngle) * startR;
          var endAngle = startAngle + 4 + rand() * 1.5;
          var endR = 7;
          var endX = Math.cos(endAngle) * endR;
          var endY = Math.sin(endAngle) * endR;
          var delay = baseT + rand() * 0.6;
          var dur = 1.7 + rand() * 1.0;
          gsap.set(p, { x: startX, y: startY, opacity: 0 });
          tl.to(p, { opacity: 1, duration: 0.2 }, delay);
          tl.to(p, { x: endX, y: endY, duration: dur, ease: "power2.in" }, delay);
          tl.to(p, { opacity: 0, duration: 0.2 }, delay + dur - 0.15);
        });
      })();
      tl.to("#scene-01-techniques-grid .vortex-core", {
        scale: 1.4, duration: 0.6, ease: "sine.inOut",
        yoyo: true, repeat: 4, transformOrigin: "center center",
      }, intStart("sq11") + 0.4);

      // ===== 7. Glowing orb (sq12) =====
      tl.fromTo([sel("orb"), sel("orb-core")],
        { scale: 1 },
        { scale: 1.2, duration: 1.5, ease: "sine.inOut", yoyo: true, repeat: 1, transformOrigin: "center center" },
        intStart("sq12")
      );

      // ===== 8. Spirograph (sq13) =====
      var spT = intStart("sq13");
      tl.to(sel("spiro-r1"), { rotation: 360,  transformOrigin: "0 0", duration: 3.0, ease: "none" }, spT);
      tl.to(sel("spiro-r2"), { rotation: -540, transformOrigin: "0 0", duration: 3.0, ease: "none" }, spT);
      tl.to(sel("spiro-r3"), { rotation: 720,  transformOrigin: "0 0", duration: 3.0, ease: "none" }, spT);
      tl.to(sel("spiro-r4"), { rotation: -360, transformOrigin: "0 0", duration: 3.0, ease: "none" }, spT);
      tl.to(sel("spiro-r5"), { rotation: 540,  transformOrigin: "0 0", duration: 3.0, ease: "none" }, spT);

      // ===== 9. Radial burst rotates (sq20) =====
      tl.to(sel("burst"), {
        rotation: 30, duration: 3.0, ease: "none", transformOrigin: "center center",
      }, intStart("sq20"));

      // ===== 10. Kinetic MOTION (sq21) =====
      var chars = root.querySelectorAll("#kword .kinetic-char");
      var kT = intStart("sq21");
      tl.from(chars, {
        y: 50, rotationX: -90, autoAlpha: 0,
        duration: 0.6, ease: "back.out(2)",
        stagger: 0.05, transformOrigin: "50% 50% -15px",
      }, kT);
      tl.to(chars, {
        y: -8, duration: 0.45, ease: "sine.inOut",
        yoyo: true, repeat: 1,
        stagger: { each: 0.05, from: "start" },
      }, kT + 1.0);
      tl.to(chars, {
        rotationY: 15, duration: 1.0, ease: "sine.inOut",
        yoyo: true, repeat: 1, stagger: 0.03,
      }, kT + 1.6);

      // ===== 11. Glitch text (sq22) =====
      var glT = intStart("sq22");
      tl.to(sel("g-r"), { x: -2, duration: 0.08, ease: "steps(1)", yoyo: true, repeat: 30 }, glT);
      tl.to(sel("g-g"), { x: 2,  duration: 0.08, ease: "steps(1)", yoyo: true, repeat: 30 }, glT + 0.04);
      tl.to(sel("g-b"), { x: 3, y: 1, duration: 0.08, ease: "steps(1)", yoyo: true, repeat: 30 }, glT);
      [glT + 0.6, glT + 1.2, glT + 1.9, glT + 2.4].forEach(function(t) {
        tl.to(sel("g-r"), { x: -8, duration: 0.05, ease: "steps(1)" }, t);
        tl.to(sel("g-r"), { x: -2, duration: 0.05, ease: "steps(1)" }, t + 0.08);
      });
      tl.call(function() {
        $("g-r").textContent = "RENDER";
        $("g-g").textContent = "RENDER";
        $("g-b").textContent = "RENDER";
        $("g-base").textContent = "RENDER";
      }, [], glT + 1.5);
      tl.fromTo(sel("scanline"),
        { y: 0 },
        { y: 230, duration: 1.4, ease: "none", repeat: 1 },
        glT
      );

      // ===== 12. Sine waves undulate (sq23) =====
      var wT = intStart("sq23");
      for (var w = 0; w < 5; w++) {
        tl.to(sel("wave-" + w), {
          y: 6, duration: 1.1, ease: "sine.inOut",
          yoyo: true, repeat: 2,
        }, wT + w * 0.1);
      }

      // ===== 13. Binary rain (sq30) =====
      var rT = intStart("sq30");
      for (var rc = 0; rc < 22; rc++) {
        tl.to(sel("rain-" + rc), {
          y: 200 + (rc * 13) % 80,
          duration: 3.0 + (rc % 5) * 0.2,
          ease: "none",
        }, rT);
      }

      // ===== 14. Maze shimmer (sq31) =====
      tl.to(sel("maze"), {
        backgroundPosition: "30px 30px",
        duration: 3.0, ease: "none",
      }, intStart("sq31"));

      // ===== 15. Audio bars (sq32) =====
      (function() {
        var rand = rng(99);
        var bars = root.querySelectorAll(".bar");
        gsap.set(bars, { scaleY: 0.1 });
        var baseT = intStart("sq32");
        bars.forEach(function(bar, i) {
          for (var k = 0; k < 8; k++) {
            var amp = 0.15 + rand() * 0.85;
            tl.to(bar, {
              scaleY: amp,
              duration: 0.16,
              ease: "power2.out",
            }, baseT + k * 0.32 + (i * 0.005));
          }
        });
      })();

      // ===== 16. Neon globe (sq33) =====
      var gT = intStart("sq33");
      tl.to(sel("globe"), {
        rotationY: 360, duration: 3.2, ease: "none",
        transformOrigin: "center center",
      }, gT);
      tl.fromTo(sel("ping1"),
        { scale: 0.5, opacity: 1 },
        { scale: 2.5, opacity: 0, duration: 1.0, ease: "power1.out", repeat: 2 },
        gT + 0.3
      );
      tl.fromTo(sel("ping2"),
        { scale: 0.5, opacity: 1 },
        { scale: 2.5, opacity: 0, duration: 1.0, ease: "power1.out", repeat: 2 },
        gT + 0.7
      );

      // ===== Clock — fast-forward time =====
      var clT = intStart("sqL0");
      tl.fromTo(sel("hand-s"), { rotation: 0 }, { rotation: 1440, duration: 3.0, ease: "none", transformOrigin: "50% 100%" }, clT);
      tl.fromTo(sel("hand-m"), { rotation: 0 }, { rotation: 240,  duration: 3.0, ease: "none", transformOrigin: "50% 100%" }, clT);
      tl.fromTo(sel("hand-h"), { rotation: 0 }, { rotation: 20,   duration: 3.0, ease: "none", transformOrigin: "50% 100%" }, clT);

      // ===== Stock — draw line + count up =====
      var stT = intStart("sqL1");
      (function() {
        var path = $("stock-path");
        var len = path.getTotalLength();
        path.style.strokeDasharray = len;
        path.style.strokeDashoffset = len;
        tl.to(path, { strokeDashoffset: 0, duration: 2.0, ease: "power2.out" }, stT);
        tl.fromTo(sel("stock-fill"), { opacity: 0 }, { opacity: 1, duration: 2.0, ease: "power2.out" }, stT);
        var counter = { v: 0 };
        tl.to(counter, {
          v: 184.32,
          duration: 2.2,
          ease: "power2.out",
          onUpdate: function() {
            $("stock-price").textContent = "$" + counter.v.toFixed(2);
          },
        }, stT);
        var delta = { v: 0 };
        tl.to(delta, {
          v: 12.47,
          duration: 2.2,
          ease: "power2.out",
          onUpdate: function() {
            $("stock-delta").textContent = "+" + delta.v.toFixed(2) + "%";
          },
        }, stT);
      })();

      // ===== Neural network — edges + nodes pulse =====
      var nnT = intStart("sqL2");
      (function() {
        for (var i = 0; i < nnEdgeCount; i++) {
          var delay = nnT + (i % 20) * 0.04;
          tl.fromTo(sel("nn-e" + i),
            { opacity: 0.05 },
            { opacity: 0.6, duration: 0.3, ease: "power1.out", yoyo: true, repeat: 3 },
            delay
          );
        }
        for (var n = 0; n < nnNodeCount; n++) {
          tl.fromTo(sel("nn-n" + n),
            { scale: 1 },
            { scale: 1.6, duration: 0.4, ease: "sine.inOut", yoyo: true, repeat: 2, transformOrigin: "center center" },
            nnT + n * 0.04
          );
        }
      })();

      // ===== Loading spinners =====
      var spT2 = intStart("sqL3");
      tl.to(sel("spin-ring"), { rotation: 720, duration: 3.0, ease: "none", transformOrigin: "center center" }, spT2);
      var dots = root.querySelectorAll("#spin-dots .spin-dot");
      tl.to(dots, {
        y: -10, duration: 0.4, ease: "sine.inOut",
        yoyo: true, repeat: 5, stagger: { each: 0.12, repeat: 5 }
      }, spT2);
      var sbars = root.querySelectorAll("#spin-bars .spin-bar");
      tl.to(sbars, {
        scaleY: 0.3, duration: 0.35, ease: "sine.inOut",
        yoyo: true, repeat: 7, stagger: { each: 0.08, repeat: 7 }
      }, spT2);
      tl.to(sel("spin-pulse"), {
        scale: 0.6, duration: 0.7, ease: "sine.inOut",
        yoyo: true, repeat: 3, transformOrigin: "center center"
      }, spT2);

      // ===== QR code — reveal cells from center outward =====
      var qrT = intStart("sqR0");
      (function() {
        var cells = root.querySelectorAll("#qr-grid .qr-cell");
        var center = 10;
        cells.forEach(function(cell) {
          var idx = parseInt(cell.dataset.idx);
          var r = Math.floor(idx / 21), c = idx % 21;
          var d = Math.max(Math.abs(r - center), Math.abs(c - center));
          tl.to(cell, {
            opacity: 1, duration: 0.08, ease: "power1.out",
          }, qrT + d * 0.06);
        });
      })();

      // ===== DNA rotation =====
      var dnT = intStart("sqR1");
      (function() {
        var N = dnaN;
        for (var i = 0; i < N; i++) {
          var t = i / (N - 1);
          var phaseStart = t * Math.PI * 4;
          var obj = { p: phaseStart };
          (function(ii, oo, ps) {
            tl.to(oo, {
              p: ps + Math.PI * 2,
              duration: 3.0,
              ease: "none",
              onUpdate: function() {
                var x1 = 125 + Math.cos(oo.p) * 55;
                var x2 = 125 + Math.cos(oo.p + Math.PI) * 55;
                var rEl = $("dna-r" + ii);
                var aEl = $("dna-a" + ii);
                var bEl = $("dna-b" + ii);
                if (rEl) { rEl.setAttribute("x1", x1); rEl.setAttribute("x2", x2); }
                if (aEl) {
                  aEl.setAttribute("cx", x1);
                  var a = 0.4 + 0.6 * (Math.cos(oo.p) * 0.5 + 0.5);
                  aEl.setAttribute("opacity", a);
                }
                if (bEl) {
                  bEl.setAttribute("cx", x2);
                  var b = 0.4 + 0.6 * (Math.cos(oo.p + Math.PI) * 0.5 + 0.5);
                  bEl.setAttribute("opacity", b);
                }
              },
            }, dnT);
          })(i, obj, phaseStart);
        }
      })();

      // ===== Code editor — type lines =====
      var coT = intStart("sqR2");
      for (var cl = 1; cl <= 8; cl++) {
        tl.to(sel("cl" + cl), { autoAlpha: 1, duration: 0.05 }, coT + cl * 0.28);
      }

      // ===== Weather — count temp, cloud drift, rain =====
      var weT = intStart("sqR3");
      (function() {
        var temp = { v: 0 };
        tl.to(temp, {
          v: 67,
          duration: 1.8,
          ease: "power2.out",
          onUpdate: function() {
            $("weather-temp").textContent = Math.round(temp.v) + "°";
          },
        }, weT);
        tl.fromTo(sel("cloud"), { x: 10 }, { x: -10, duration: 3.0, ease: "sine.inOut" }, weT);
        var drops = root.querySelectorAll(".raindrop");
        drops.forEach(function(d, i) {
          var delay = weT + parseFloat(d.dataset.delay);
          gsap.set(d, { y: 0, opacity: 0 });
          tl.to(d, { opacity: 0.8, duration: 0.1 }, delay);
          tl.to(d, { y: 170, duration: 0.7, ease: "power1.in" }, delay);
          tl.to(d, { opacity: 0, duration: 0.1 }, delay + 0.65);
          tl.set(d, { y: 0 }, delay + 0.75);
          tl.to(d, { opacity: 0.8, duration: 0.1 }, delay + 0.8);
          tl.to(d, { y: 170, duration: 0.7, ease: "power1.in" }, delay + 0.8);
          tl.to(d, { opacity: 0, duration: 0.1 }, delay + 1.4);
        });
      })();

      window.__timelines["scene-01-techniques-grid"] = tl;
    })();
  </script>
</body>
</html>
