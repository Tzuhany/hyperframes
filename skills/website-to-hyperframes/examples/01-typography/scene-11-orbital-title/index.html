<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>scene-11-orbital-title</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;700;900&family=JetBrains+Mono:wght@400&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050505; }

    #scene-11-orbital-title {
      --bg: #050505;
      --ink: #e8e4dc;
      --accent: #e8a769;
      --font-display: "Fraunces", "Source Serif 4", serif;
      --font-data: "JetBrains Mono", monospace;
      position: relative;
      overflow: hidden;
      background: var(--bg);
      color: var(--ink);
    }

    .scene-content {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .stage {
      position: relative;
      width: 1920px;
      height: 1080px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .glow {
      position: absolute;
      width: 900px;
      height: 900px;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(
        circle,
        rgba(232, 167, 105, 0.35) 0%,
        rgba(232, 167, 105, 0.12) 40%,
        transparent 70%
      );
      filter: blur(100px);
      opacity: 0;
      pointer-events: none;
      z-index: 0;
    }

    .orbit {
      position: absolute;
      width: 600px;
      height: 600px;
      left: 50%;
      top: 50%;
      margin-left: -300px;
      margin-top: -300px;
      border: 1px solid rgba(232, 167, 105, 0.3);
      border-radius: 50%;
      opacity: 0;
      transform: scale(0.5);
      z-index: 2;
    }

    .orbit-dot-wrap {
      position: absolute;
      width: 0;
      height: 0;
      left: 50%;
      top: 50%;
      z-index: 3;
    }
    .orbit-dot {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      left: -4px;
      top: -304px;
      box-shadow: 0 0 12px rgba(232, 167, 105, 0.8);
    }

    .title-wrap {
      position: relative;
      z-index: 4;
      display: flex;
      gap: 4px;
      justify-content: center;
      align-items: center;
    }

    .title-wrap .char {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 160px;
      line-height: 1;
      color: var(--ink);
      display: inline-block;
      letter-spacing: 0.04em;
    }

    .title-wrap .char.space {
      width: 30px;
    }

    .accent-line-wrap {
      position: absolute;
      left: 50%;
      top: 50%;
      margin-top: 130px;
      transform: translateX(-50%);
      width: 1920px;
      height: 4px;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .accent-line {
      width: 100%;
      height: 2px;
    }
    .accent-line svg {
      display: block;
      width: 100%;
      height: 2px;
    }

    .tagline {
      position: absolute;
      left: 50%;
      top: 50%;
      margin-top: 200px;
      transform: translateX(-50%);
      font-family: var(--font-data);
      font-weight: 400;
      font-size: 24px;
      color: var(--accent);
      letter-spacing: 0.15em;
      white-space: pre;
      z-index: 4;
    }
    .tagline .tc {
      display: inline-block;
      opacity: 0;
      white-space: pre;
    }
    .caret {
      display: inline-block;
      width: 10px;
      color: var(--accent);
    }

    .scene-label {
      position: absolute;
      left: 48px;
      bottom: 48px;
      font-size: 16px;
      color: #707070;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 500;
      z-index: 100;
      font-family: "Inter", sans-serif;
    }
    .scene-label .accent { color: #f5f5f5; font-weight: 600; }
  </style>
</head>
<body>
  <div id="scene-11-orbital-title"
       data-composition-id="scene-11-orbital-title"
       data-start="0"
       data-duration="4"
       data-width="1920"
       data-height="1080"
       style="width:1920px; height:1080px;">
    <div class="scene-content">
      <div class="stage">
        <div class="glow" id="glow"></div>

        <div class="orbit" id="orbit"></div>
        <div class="orbit-dot-wrap" id="orbit-dot-wrap">
          <div class="orbit-dot"></div>
        </div>

        <div class="title-wrap" id="title">
          <span class="char" data-i="0">K</span>
          <span class="char" data-i="1">I</span>
          <span class="char" data-i="2">N</span>
          <span class="char" data-i="3">E</span>
          <span class="char" data-i="4">T</span>
          <span class="char" data-i="5">I</span>
          <span class="char" data-i="6">C</span>
          <span class="char space" data-i="7"></span>
          <span class="char" data-i="8">T</span>
          <span class="char" data-i="9">Y</span>
          <span class="char" data-i="10">P</span>
          <span class="char" data-i="11">E</span>
        </div>

        <div class="accent-line-wrap">
          <svg viewBox="0 0 1920 2" preserveAspectRatio="none">
            <line
              id="accent-line"
              x1="0"
              y1="1"
              x2="1920"
              y2="1"
              stroke="#e8a769"
              stroke-width="2"
              stroke-dasharray="1920"
              stroke-dashoffset="1920"
            />
          </svg>
        </div>

        <div class="tagline" id="tagline"><span id="tagline-text"></span></div>

        <script>
          // Pre-render tagline characters at DOM-build time so the snapshot tool
          // can find them at t=0. Each char gets its own span and is revealed
          // via autoAlpha tweens (seek-safe) rather than onUpdate callbacks
          // (which don't fire reliably on gsap.seek()).
          (function () {
            var TAGLINE = "Code in. Motion out.";
            var host = document.getElementById("tagline-text");
            var frag = document.createDocumentFragment();
            Array.from(TAGLINE).forEach(function (ch) {
              var s = document.createElement("span");
              s.className = "tc";
              s.textContent = ch;
              frag.appendChild(s);
            });
            host.replaceChildren(frag);
          })();
        </script>
      </div>
    </div>

    <div class="scene-label">Scene 11 &middot; <span class="accent">Orbital Title</span> &middot; per-char alt-side entrance + SVG line draw + orbital ring + type-on tagline</div>
  </div>

  <script>
    (function () {
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      // ============ LETTERS IN (0.1s) ============
      var chars = document.querySelectorAll("#scene-11-orbital-title .title-wrap .char");
      // Start hidden
      gsap.set(chars, { autoAlpha: 0 });
      chars.forEach(function (el, i) {
        var fromLeft = (i + 1) % 2 === 1; // alt side per char
        tl.fromTo(
          el,
          {
            y: 80,
            x: fromLeft ? -30 : 30,
            autoAlpha: 0,
            rotation: -15,
          },
          {
            y: 0,
            x: 0,
            autoAlpha: 1,
            rotation: 0,
            duration: 0.7,
            ease: "back.out(2.0)",
          },
          0.1 + i * 0.06,
        );
      });

      // ============ ACCENT LINE (1.0s) ============
      tl.to(
        "#scene-11-orbital-title #accent-line",
        { strokeDashoffset: 0, duration: 0.6, ease: "power3.out" },
        1.0,
      );

      // ============ RADIAL GLOW BREATHE IN (1.0s) ============
      tl.to("#scene-11-orbital-title #glow", { opacity: 0.2, duration: 0.4, ease: "sine.inOut" }, 1.0);
      tl.to("#scene-11-orbital-title #glow", { opacity: 0.1, duration: 0.4, ease: "sine.inOut" }, 1.4);

      // ============ ORBIT RING (1.4s) ============
      tl.to(
        "#scene-11-orbital-title #orbit",
        { scale: 1, autoAlpha: 0.3, duration: 0.5, ease: "expo.out" },
        1.4,
      );

      // ============ ORBIT DOT (1.4s onward, 2.5s linear) ============
      tl.fromTo(
        "#scene-11-orbital-title #orbit-dot-wrap",
        { rotation: 0 },
        { rotation: 360, duration: 2.5, ease: "none" },
        1.4,
      );

      // ============ TAGLINE TYPE-ON (1.8s) ============
      // "Code in. Motion out." with pauses after Code, in., Motion.
      // Seek-safe: each character is a pre-rendered span; reveal via autoAlpha
      // tween with steps ease so each char snaps on. Pause segments mirror the
      // source's 4-segment cadence (Code | in. | Motion | out.).
      var taglineChars = document.querySelectorAll("#scene-11-orbital-title .tagline .tc");
      var segments = [
        { len: 4, pauseAfter: 0.2 },  // "Code"
        { len: 4, pauseAfter: 0.25 }, // " in."
        { len: 7, pauseAfter: 0.1 },  // " Motion"
        { len: 5, pauseAfter: 0 },    // " out."
      ];
      var typeStart = 1.8;
      var segCursor = typeStart;
      var charIndex = 0;
      segments.forEach(function (seg) {
        var segDur = seg.len * 0.03;
        var segChars = [];
        for (var k = 0; k < seg.len; k++) {
          if (charIndex < taglineChars.length) segChars.push(taglineChars[charIndex]);
          charIndex++;
        }
        if (segChars.length) {
          tl.to(
            segChars,
            {
              autoAlpha: 1,
              duration: 0.001,
              ease: "none",
              stagger: 0.03,
            },
            segCursor,
          );
        }
        segCursor += segDur + seg.pauseAfter;
      });

      // ============ LETTER FLOAT (subtle, after entrance) ============
      // Force visibility before float to avoid from-tween state conflict
      tl.set("#scene-11-orbital-title .title-wrap .char", { autoAlpha: 1 }, 1.2);
      chars.forEach(function (el, i) {
        if (el.classList.contains("space")) return;
        var dir = i % 2 === 0 ? 1 : -1;
        tl.to(
          el,
          {
            y: 2 * dir,
            duration: 1.4,
            ease: "sine.inOut",
            yoyo: true,
            repeat: 1,
            immediateRender: false,
          },
          1.25 + i * 0.04,
        );
      });

      // ============ GLOW GENTLE BREATHE CONTINUED ============
      tl.to(
        "#scene-11-orbital-title #glow",
        { opacity: 0.14, duration: 1.2, ease: "sine.inOut", yoyo: true, repeat: 1 },
        1.8,
      );

      window.__timelines["scene-11-orbital-title"] = tl;
    })();
  </script>
</body>
</html>
