<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Skeleton - Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #demo {
        width: 1920px;
        height: 1080px;
        display: grid;
        place-items: center;
        background: #f6f7fb;
        font-family: Inter, system-ui, sans-serif;
      }
      .hf-ui-skeleton-card {
        --hf-skeleton-shimmer: -1;
        display: grid;
        grid-template-columns: 82px 1fr;
        gap: 22px;
        width: 660px;
        padding: 34px;
        border: 1px solid #e4e4e7;
        border-radius: 28px;
        background: #fff;
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.1);
      }
      .hf-ui-skeleton {
        position: relative;
        overflow: hidden;
        border-radius: 999px;
        background: #ececef;
      }
      .hf-ui-skeleton::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.8), transparent);
        transform: translateX(calc(var(--hf-skeleton-shimmer) * 120%));
      }
      .avatar {
        grid-row: span 2;
        width: 82px;
        height: 82px;
      }
      .line {
        height: 24px;
        align-self: center;
        border-radius: 14px;
      }
      .wide {
        width: 82%;
      }
    </style>
  </head>
  <body>
    <div
      id="demo"
      data-composition-id="skeleton-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="5"
    >
      <div class="hf-ui-skeleton-card">
        <span class="hf-ui-skeleton avatar"></span><span class="hf-ui-skeleton line wide"></span
        ><span class="hf-ui-skeleton line"></span>
      </div>
      <script>
        const tl = gsap.timeline({ paused: true });
        tl.to(
          ".hf-ui-skeleton-card",
          { "--hf-skeleton-shimmer": 1, duration: 1.15, ease: "none" },
          0.45,
        );
        tl.to(".hf-ui-skeleton-card", { opacity: 0.45, duration: 0.3, ease: "power2.inOut" }, 2.0);
        window.__timelines = window.__timelines || {};
        window.__timelines["skeleton-demo"] = tl;
      </script>
    </div>
  </body>
</html>
