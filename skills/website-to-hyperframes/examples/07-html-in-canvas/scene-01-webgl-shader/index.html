<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>scene-01-webgl-shader</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #0a0a0a; }

      [data-composition-id="scene-01-webgl-shader"] {
        width: 1920px;
        height: 1080px;
        position: relative;
        overflow: hidden;
        background: #0a0a12;
        font-family: "Inter", sans-serif;
      }

      [data-composition-id="scene-01-webgl-shader"] #shader-canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 1920px;
        height: 1080px;
      }

      [data-composition-id="scene-01-webgl-shader"] .scene-label {
        position: absolute;
        left: 48px;
        bottom: 48px;
        font-size: 16px;
        color: #707070;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-weight: 500;
        z-index: 100;
        font-family: "Inter", sans-serif;
      }
      [data-composition-id="scene-01-webgl-shader"] .scene-label .accent {
        color: #f5f5f5;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div
      id="scene-01-webgl-shader"
      data-composition-id="scene-01-webgl-shader"
      data-start="0"
      data-duration="1.20"
      data-width="1920"
      data-height="1080"
      style="width: 1920px; height: 1080px;"
    >
      <!-- WebGL canvas — real fragment shader generative art -->
      <canvas id="shader-canvas" width="1920" height="1080"></canvas>

      <div class="scene-label">
        Scene 01 · <span class="accent">WebGL Fragment Shader</span> · domain-warp FBM with Canvas 2D fallback
      </div>
    </div>

    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        var tl = gsap.timeline({ paused: true });
        var root = document.querySelector('[data-composition-id="scene-01-webgl-shader"]');
        var canvas = root.querySelector("#shader-canvas");
        var label = root.querySelector(".scene-label");
        var gl = canvas.getContext("webgl") || canvas.getContext("experimental-webgl");

        if (!gl) {
          // Fallback: animated multi-stop radial + linear gradients if WebGL unavailable
          // (e.g. headless snapshot/render). Mimics the warm domain-warp look.
          var ctx2d = canvas.getContext("2d");
          if (ctx2d) {
            var renderFallback = function (t) {
              // Base warm radial — center drifts with time
              var cx = 960 + Math.sin(t * 1.2) * 220;
              var cy = 540 + Math.cos(t * 0.9) * 140;
              var grd = ctx2d.createRadialGradient(cx, cy, 80, 960, 540, 1100);
              grd.addColorStop(0.00, "#f4b07a");
              grd.addColorStop(0.18, "#e8935d");
              grd.addColorStop(0.42, "#d4586a");
              grd.addColorStop(0.70, "#7fc3c8");
              grd.addColorStop(1.00, "#0a0a12");
              ctx2d.fillStyle = grd;
              ctx2d.fillRect(0, 0, 1920, 1080);

              // Iridescent overlay band — sweeps across frame
              var bx = 1920 * (0.2 + 0.6 * (t % 1));
              var lg = ctx2d.createLinearGradient(bx - 600, 0, bx + 600, 1080);
              lg.addColorStop(0.0, "rgba(146, 196, 255, 0)");
              lg.addColorStop(0.5, "rgba(220, 160, 220, 0.35)");
              lg.addColorStop(1.0, "rgba(255, 200, 140, 0)");
              ctx2d.fillStyle = lg;
              ctx2d.fillRect(0, 0, 1920, 1080);

              // Subtle vignette
              var vg = ctx2d.createRadialGradient(960, 540, 600, 960, 540, 1200);
              vg.addColorStop(0, "rgba(0, 0, 0, 0)");
              vg.addColorStop(1, "rgba(0, 0, 0, 0.55)");
              ctx2d.fillStyle = vg;
              ctx2d.fillRect(0, 0, 1920, 1080);
            };

            renderFallback(0.5);

            var proxy2d = { time: 0.5 };
            tl.to(proxy2d, {
              time: 1.44,
              duration: 0.94,
              ease: "none",
              onUpdate: function () { renderFallback(proxy2d.time); }
            }, 0);
          }
          gsap.set(label, { opacity: 0 });
          tl.to(label, { opacity: 1, duration: 0.3, ease: "power2.out" }, 0.15);
          // Pad timeline to master slot duration (1.20s)
          tl.to({}, { duration: 1.20 }, 0);
          window.__timelines["scene-01-webgl-shader"] = tl;
          return;
        }

        // Vertex shader — simple fullscreen quad
        var vsrc = [
          "attribute vec2 a_pos;",
          "varying vec2 v_uv;",
          "void main() {",
          "  v_uv = a_pos * 0.5 + 0.5;",
          "  gl_Position = vec4(a_pos, 0.0, 1.0);",
          "}"
        ].join("\n");

        // Fragment shader — domain warp generative art
        // Cascaded FBM with cosine palette. Organic, warm, iridescent.
        var fsrc = [
          "precision mediump float;",
          "varying vec2 v_uv;",
          "uniform float u_time;",
          "uniform vec2 u_res;",
          "",
          "// Hash-based noise (deterministic, no textures needed)",
          "float hash(vec2 p) {",
          "  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);",
          "}",
          "float noise(vec2 p) {",
          "  vec2 i = floor(p), f = fract(p);",
          "  f = f * f * (3.0 - 2.0 * f);",
          "  return mix(",
          "    mix(hash(i), hash(i + vec2(1.0, 0.0)), f.x),",
          "    mix(hash(i + vec2(0.0, 1.0)), hash(i + vec2(1.0, 1.0)), f.x),",
          "    f.y);",
          "}",
          "float fbm(vec2 p) {",
          "  float v = 0.0, a = 0.5;",
          "  mat2 R = mat2(0.8, 0.6, -0.6, 0.8);",
          "  for (int i = 0; i < 5; i++) {",
          "    v += a * noise(p);",
          "    p = R * p * 2.02;",
          "    a *= 0.5;",
          "  }",
          "  return v;",
          "}",
          "",
          "// Cosine palette",
          "vec3 palette(float t) {",
          "  vec3 a = vec3(0.5, 0.5, 0.5);",
          "  vec3 b = vec3(0.5, 0.5, 0.5);",
          "  vec3 c = vec3(1.0, 1.0, 1.0);",
          "  vec3 d = vec3(0.0, 0.33, 0.67);",
          "  return a + b * cos(6.28318 * (c * t + d));",
          "}",
          "",
          "void main() {",
          "  vec2 uv = v_uv;",
          "  uv.x *= u_res.x / u_res.y;",
          "  float t = u_time * 0.4;",
          "",
          "  // Domain warp: fbm(p + fbm(p + fbm(p)))",
          "  vec2 q = vec2(fbm(uv * 3.0 + t * 0.3), fbm(uv * 3.0 + vec2(5.2, 1.3) + t * 0.2));",
          "  vec2 r = vec2(",
          "    fbm(uv * 3.0 + q * 4.0 + vec2(1.7, 9.2) + t * 0.15),",
          "    fbm(uv * 3.0 + q * 4.0 + vec2(8.3, 2.8) + t * 0.1)",
          "  );",
          "  float n = fbm(uv * 3.0 + r * 2.0);",
          "",
          "  // Color from warp field",
          "  vec3 col = palette(n * 2.0 + t * 0.2);",
          "  col = mix(col, palette(length(q) * 3.0 + t * 0.1), 0.4);",
          "  col *= 0.7 + 0.3 * n;",
          "",
          "  // Warm tint + vignette",
          "  col = mix(col, vec3(0.92, 0.58, 0.35), 0.08);",
          "  float vig = 1.0 - 0.4 * length(v_uv - 0.5);",
          "  col *= vig;",
          "",
          "  gl_FragColor = vec4(col, 1.0);",
          "}"
        ].join("\n");

        // Compile shaders
        function mkShader(type, src) {
          var sh = gl.createShader(type);
          gl.shaderSource(sh, src);
          gl.compileShader(sh);
          return sh;
        }
        var prog = gl.createProgram();
        gl.attachShader(prog, mkShader(gl.VERTEX_SHADER, vsrc));
        gl.attachShader(prog, mkShader(gl.FRAGMENT_SHADER, fsrc));
        gl.linkProgram(prog);
        gl.useProgram(prog);

        // Fullscreen quad
        var buf = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, buf);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]), gl.STATIC_DRAW);
        var aPos = gl.getAttribLocation(prog, "a_pos");
        gl.enableVertexAttribArray(aPos);
        gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

        // Uniforms
        var uTime = gl.getUniformLocation(prog, "u_time");
        var uRes = gl.getUniformLocation(prog, "u_res");
        gl.uniform2f(uRes, 1920, 1080);

        // Render function
        function renderFrame(time) {
          gl.uniform1f(uTime, time);
          gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        }

        // Initial render
        renderFrame(0.5);

        // GSAP drives the time uniform via proxy
        var proxy = { time: 0.5 };
        tl.to(proxy, {
          time: 1.44,
          duration: 0.94,
          ease: "none",
          onUpdate: function () { renderFrame(proxy.time); }
        }, 0);

        // Label fades in
        gsap.set(label, { opacity: 0 });
        tl.to(label, { opacity: 1, duration: 0.3, ease: "power2.out" }, 0.15);

        // Pad timeline to master slot duration (1.20s) to prevent black frames at beat tail
        tl.to({}, { duration: 1.20 }, 0);

        window.__timelines["scene-01-webgl-shader"] = tl;
      })();
    </script>
  </body>
</html>
