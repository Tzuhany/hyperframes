<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Drawer - Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #demo {
        width: 1920px;
        height: 1080px;
        display: grid;
        place-items: center;
        background: #f4f4f5;
        font-family: Inter, system-ui, sans-serif;
      }
      .demo-frame {
        display: grid;
        place-items: center;
        min-width: 760px;
        min-height: 480px;
        padding: 56px;
      }
      .hf-ui-drawer {
        width: 520px;
        padding: 16px 24px 24px;
        border: 1px solid #e4e4e7;
        border-radius: 28px 28px 18px 18px;
        background: #ffffff;
        color: #18181b;
        font-family: Inter, system-ui, sans-serif;
        box-shadow: 0 -10px 70px rgba(0, 0, 0, 0.14);
      }
      .hf-ui-drawer-handle {
        width: 56px;
        height: 5px;
        margin: 0 auto 22px;
        border-radius: 999px;
        background: #d4d4d8;
      }
      .hf-ui-drawer h3 {
        margin: 0 0 18px;
        font-size: 24px;
      }
      .hf-ui-drawer-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        height: 54px;
        border-top: 1px solid #f4f4f5;
        font-weight: 760;
      }
      .hf-ui-drawer-row strong {
        color: #71717a;
        font-size: 13px;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div
      id="demo"
      data-composition-id="drawer-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="5"
    >
      <div class="demo-frame">
        <div class="hf-ui-drawer">
          <div class="hf-ui-drawer-handle"></div>
          <h3>Export options</h3>
          <div class="hf-ui-drawer-row"><span>MP4 1080p</span><strong>Ready</strong></div>
          <div class="hf-ui-drawer-row"><span>Transparent WebM</span><strong>Beta</strong></div>
        </div>
      </div>
      <script>
        const tl = gsap.timeline({ paused: true });
        tl.fromTo(
          ".hf-ui-drawer",
          { y: 180, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.58, ease: "back.out(1.15)" },
          0.35,
        );
        tl.fromTo(
          ".hf-ui-drawer-row",
          { y: 18, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.28, stagger: 0.08, ease: "power2.out" },
          0.78,
        );
        tl.set({}, {}, 5);
        window.__timelines = window.__timelines || {};
        window.__timelines["drawer-demo"] = tl;
      </script>
    </div>
  </body>
</html>
